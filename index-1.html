    .tb:hover,.tb.a{background:var(--g10)}
    .tb.a{border-color:var(--g35);color:var(--gold)}
    .vtb{background:transparent;border:1px solid transparent;border-radius:4px;padding:5px 9px;color:var(--tx2);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;transition:all .2s}
    .vtb:hover,.vtb.a{background:var(--g10)}
    .vtb.a{border-color:var(--g35);color:var(--gold)}
    .bg{background:var(--gold);color:#0D0D0D;border:none;border-radius:5px;padding:8px 16px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .2s;flex-shrink:0}
    .bg:hover{background:var(--gold2)}
    .bo{background:transparent;color:var(--tx2);border:1px solid var(--br2);border-radius:5px;padding:7px 13px;font-family:'Montserrat',sans-serif;font-size:10px;cursor:pointer;transition:all .2s}
    .bo:hover{border-color:var(--g20);color:var(--tx)}
    .be{background:var(--g10);color:var(--gold);border:1px solid var(--g20);border-radius:5px;padding:5px 10px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;cursor:pointer}
    .bd{background:rgba(180,40,40,.12);color:rgba(220,80,80,.8);border:1px solid rgba(180,40,40,.25);border-radius:5px;padding:5px 10px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;cursor:pointer}
    .card{transition:border-color .2s,transform .15s}
    .card:hover{border-color:var(--g35)!important;transform:translateY(-1px)}
    .vc{cursor:pointer}
    .vc.op{border-color:var(--g50)!important;border-radius:7px 7px 0 0!important}

/* ── Constantes globales ─────────────────────────────────────────── */
const MESES      = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const MORD       = Object.fromEntries(MESES.map((m,i)=>[m,i]));
const VARIEDADES = ["Garnacha","Tempranillo","Macabeo","Garnacha Blanca"];
const VIÑAS      = ["Grío","Quebracántaros"];
const AÑOS_V     = [2020,2021,2022,2023,2024,2025,2026];
const NEXT       = {"":"si",si:"no",no:"quizas",quizas:""};

  MB:  {fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",background:"var(--g10)",border:"1px solid var(--g20)",color:"var(--gold)",padding:"3px 7px",borderRadius:4},
};

/* ── Helpers ─────────────────────────────────────────────────────── */
function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function parseDate(s){if(!s)return null;const p=s.split("/");if(p.length!==3)return null;const[d,m,y]=p.map(Number);if(!d||!m||!y)return null;return new Date(y,m-1,d);}
function fmtDate(d){if(!d)return"";return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();}
function diasR(s){const d=parseDate(s);if(!d)return null;const h=new Date();h.setHours(0,0,0,0);return Math.round((d-h)/864e5);}
function todayStr(){return fmtDate(new Date());}

function makeVendimia(año){
  return {año,fechaVendimia:"",viñas:VIÑAS.map(n=>({nombre:n,kg:0,variedad:"Garnacha"})),litros:0,densidad:"",ph:"",variedades:[],medicionesCampo:[],sulfuroso:[],analisis:[],hitos:[],notas:""};
}
function migrateVendimias(saved){
  if(!saved)return AÑOS_V.map(makeVendimia);
  const byAño=Object.fromEntries(saved.map(v=>[v.año,v]));
  return AÑOS_V.map(año=>{
    const old=byAño[año];
    if(!old)return makeVendimia(año);
    // migrate old analisis object → array
    let an=old.analisis;
    if(!Array.isArray(an)){
      an=(an&&Object.values(an).some(v=>v&&v!==""))
        ?[{id:Date.now(),fecha:"", ...an}]
        :[];
    }
    return{...makeVendimia(año),...old,
      viñas:old.viñas||VIÑAS.map(n=>({nombre:n,kg:0,variedad:"Garnacha"})),
      medicionesCampo:old.medicionesCampo||[],
      sulfuroso:old.sulfuroso||[],
      analisis:an,
      hitos:old.hitos||[],
    };
  });
}

/* ══════════════════════════════════════════════════════════════════

══════════════════════════════════════════════════════════════════ */
function FormMedicion({ onSave, onCancel }) {

    <div style={{background:"var(--bg2)",border:"1px solid var(--g20)",borderRadius:6,padding:12,marginTop:8}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
        <div><span style={S.LB}>Fecha</span><input value={f.fecha} onChange={set("fecha")} placeholder="dd/mm/aaaa"/></div>
        <div><span style={S.LB}>Alcohol probable %</span><input value={f.alcohol} onChange={set("alcohol")} placeholder="—"/></div>
        <div><span style={S.LB}>PH</span><input value={f.ph} onChange={set("ph")} placeholder="—"/></div>
      </div>
      <div style={{marginBottom:8}}>
        <span style={S.LB}>Comentario</span>
        <textarea rows={3} value={f.comentario} onChange={set("comentario")} placeholder="Observaciones de la medición…"/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button className="bg" onClick={()=>onSave({id:Date.now(),...f})}>Guardar</button>
        <button className="bo" onClick={onCancel}>Cancelar</button>
      </div>
    </div>
  );
}

function FormSulfuroso({ onSave, onCancel }) {
  const [f,setF] = useState({fecha:todayStr(),dosis:"",comentario:""});

  return (
    <div style={{background:"var(--bg2)",border:"1px solid var(--g20)",borderRadius:6,padding:12,marginTop:8}}>

}

function FormHito({ onSave, onCancel }) {
  const [f,setF] = useState({fecha:todayStr(),descripcion:""});

function FormAnalisis({ onSave, onCancel }) {
  const empty = Object.fromEntries(CAMPOS_AN.map(([,k])=>[k,""]));
  const [f,setF] = useState({fecha:todayStr(),...empty,driveLink:""});

      </div>
      <div style={{display:"flex",gap:8}}>
        <button className="bg" onClick={()=>onSave({id:Date.now(),...f})}>Guardar análisis</button>
        <button className="bo" onClick={onCancel}>Cancelar</button>
      </div>

/* ── Componentes UI reutilizables ────────────────────────────────── */
function InlineEdit({value,onChange,style={},placeholder="",multiline=false}){
  const[edit,setEdit]=useState(false);
  const ref=useRef();
  useEffect(()=>{if(edit&&ref.current)ref.current.focus();},[edit]);
  const close=useCallback(()=>setTimeout(()=>setEdit(false),150),[]);
  if(edit){
    const p={ref,value,placeholder,onChange:e=>onChange(e.target.value),onBlur:close,
      onKeyDown:e=>{if(!multiline&&e.key==="Enter"){setEdit(false);}},
      style:{...style,background:"var(--sur)",border:"1px solid var(--g50)",borderRadius:4,padding:"3px 8px",color:"var(--tx)",fontFamily:"inherit",fontSize:"inherit",fontWeight:"inherit",outline:"none",width:"100%"}};
    return multiline?<textarea rows={3}{...p}/>:<input{...p}/>;
  }
  return <span className="editable" style={style} onClick={()=>setEdit(true)} title="Toca para editar">{value||<span style={{color:"var(--tx3)"}}>{placeholder}</span>}</span>;
}

function Stars({value,onChange}){
  return <div style={{display:"flex",gap:4,marginTop:4}}>{[1,2,3,4,5].map(n=><button key={n} onClick={()=>onChange(n)} style={{flex:1,height:20,borderRadius:3,border:"none",cursor:"pointer",background:n<=value?"var(--gold)":"rgba(232,168,32,.1)"}}/>)}</div>;
}
function Av({nombre,size=44}){
  return <div style={{width:size,height:size,borderRadius:"50%",background:"#111",border:"1.5px solid var(--g35)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Montserrat",fontSize:size*.4,fontWeight:700,color:"var(--gold)",flexShrink:0}}>{(nombre||"?").charAt(0).toUpperCase()}</div>;
}
function SocioBotones({fid,socios,asist,toggle}){
  return <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{socios.map(sc=>{const st=asist[fid+"_"+sc.id]||"";return <button key={sc.id} className="sdot" title={(sc.nombre+(sc.apodo?" "+sc.apodo:""))+": "+ALBL[st]} style={{background:"var(--bg2)",border:"1.5px solid "+ABRD[st],borderRadius:5,padding:"5px 9px",display:"flex",alignItems:"center",gap:5}} onClick={()=>toggle(fid,sc.id)}><span style={{fontFamily:"Montserrat",fontSize:11,fontWeight:500,color:"var(--tx2)"}}>{sc.nombre}</span>{sc.apodo&&<span style={{fontSize:9,color:"var(--tx3)"}}>{sc.apodo}</span>}<span style={{fontSize:13}}>{AICON[st]}</span></button>;})}</div>;
}
function RowItem({label,children}){
  return <div style={{marginBottom:10}}><span style={S.LB}>{label}</span>{children}</div>;
}
function EntradaLog({fecha,titulo,extra,driveLink,onDel}){
  return(
    <div style={{background:"var(--bg2)",border:"1px solid var(--br2)",borderRadius:5,padding:"9px 11px",display:"flex",alignItems:"flex-start",gap:8,marginBottom:6}}>

        {fecha&&<p style={{fontSize:10,color:"var(--gold)",fontWeight:600,marginBottom:2}}>📅 {fecha}</p>}
        <p style={{fontSize:12,color:"var(--tx)",fontWeight:500}}>{titulo}</p>
        {extra&&<p style={{fontSize:11,color:"var(--tx2)",marginTop:2}}>{extra}</p>}
      </div>
      {driveLink&&(
        <button style={{background:"transparent",border:"none",cursor:"pointer",fontSize:20,flexShrink:0,padding:"0 4px"}} title="Abrir PDF en Google Drive" onClick={()=>window.open(driveLink,"_blank")}>📄</button>
      )}
      <button className="bd" style={{padding:"3px 8px",fontSize:10,flexShrink:0}} onClick={onDel}>✕</button>
    </div>

}

  {id:70, año:2026,nombre:"Deshojado",                emoji:"🍃",  mes:"Julio",    dia:"",desc:"Eliminación de hojas alrededor del racimo para favorecer la maduración."},
  {id:80, año:2026,nombre:"Aclareo de racimos",       emoji:"🍇",  mes:"Agosto",   dia:"",desc:"Eliminación de racimos en exceso para concentrar azúcar y sabor."},
  {id:90, año:2026,nombre:"Vendimia",                 emoji:"🍇",  mes:"Octubre",  dia:"",desc:"Recogida manual de la uva. El momento más importante del año."},
  {id:100,año:2026,nombre:"Prensado",                 emoji:"🔩",  mes:"Octubre",  dia:"",desc:"Despalillado, estrujado y prensado de la uva. Llenado de depósitos."},
  {id:110,año:2026,nombre:"Fermentación y Trasiegos", emoji:"🍷",  mes:"Noviembre",dia:"",desc:"Control de la fermentación. Remontados, temperatura y primer trasiego."},

const INV_CAT_DEF=[
  {id:"embotellado", nombre:"Embotellado",      emoji:"🍾",items:[]},
  {id:"fermentacion",nombre:"Fermentación",      emoji:"🫧",items:[]},
  {id:"limpieza",    nombre:"Limpieza",          emoji:"🧹",items:[]},
  {id:"general",     nombre:"General de Bodega", emoji:"🏚️",items:[]},
];

/* ══════════════════════════════════════════════════════════════════
   APP
══════════════════════════════════════════════════════════════════ */
function App(){
  const[tab,     setTab]    =useState("inicio");
  const[socios,  setSocios] =useState(()=>load("o6_s",SOCIOS_DEF));
  const[vends,   setVends]  =useState(()=>migrateVendimias(load("o6_v",null)));
  const[faenas,  setFaenas] =useState(()=>load("o6_f",FAENAS_DEF).map(x=>({año:2026,...x})));
  const[asist,   setAsist]  =useState(()=>load("o6_a",{}));
  const[invCat,  setInvCat] =useState(()=>load("o6_ic",INV_CAT_DEF));
  const[bodega,  setBodega] =useState(()=>load("o6_b","Bodega Orioles"));
  const[lema,    setLema]   =useState(()=>load("o6_l","Quebracántaros · Valdejalón"));
  const[openV,   setOpenV]  =useState(null);
  const[vSubTab, setVSubTab]=useState({});
  const[fYear,   setFYear]  =useState(2026);
  const[editFmes,setEditFmes]=useState(null);
  const[addF,    setAddF]   =useState(false);
  const[nF,      setNF]     =useState({nombre:"",emoji:"",mes:"Enero",desc:""});
  const[addS,    setAddS]   =useState(false);
  const[nS,      setNS]     =useState({nombre:"",apodo:"",rol:""});
  const[openCat, setOpenCat]=useState(null);
  const[addItem, setAddItem]=useState(null);
  const[nItem,   setNItem]  =useState({nombre:"",unidades:""});
  const[editItem,setEditItem]=useState(null);
  // Form visibility (no form data stored here → aislado en Form* components)
  const[showMed,  setShowMed]  =useState(null); // año
  const[showSulf, setShowSulf] =useState(null);
  const[showHito, setShowHito] =useState(null);
  const[showAnal, setShowAnal] =useState(null);
  const[openAnal, setOpenAnal] =useState(null); // {año, id} análisis expandido

  useEffect(()=>{localStorage.setItem("o6_s", JSON.stringify(socios));},[socios]);
  useEffect(()=>{localStorage.setItem("o6_v", JSON.stringify(vends)); },[vends]);
  useEffect(()=>{localStorage.setItem("o6_f", JSON.stringify(faenas));},[faenas]);
  useEffect(()=>{localStorage.setItem("o6_a", JSON.stringify(asist)); },[asist]);
  useEffect(()=>{localStorage.setItem("o6_ic",JSON.stringify(invCat));},[invCat]);
  useEffect(()=>{localStorage.setItem("o6_b", JSON.stringify(bodega));},[bodega]);
  useEffect(()=>{localStorage.setItem("o6_l", JSON.stringify(lema));  },[lema]);

  const ga=(fid,sid)=>asist[fid+"_"+sid]||"";
  const ta=(fid,sid)=>{const k=fid+"_"+sid;setAsist(p=>({...p,[k]:NEXT[p[k]||""]}));};
  const sv=(año,k,val)=>setVends(p=>p.map(x=>x.año===año?{...x,[k]:val}:x));
  const sf=(id,k,val)=>setFaenas(p=>p.map(x=>x.id===id?{...x,[k]:val}:x));
  const ss=(id,k,val)=>setSocios(p=>p.map(x=>x.id===id?{...x,[k]:val}:x));
  const getVT=(año)=>vSubTab[año]||"general";
  const setVT=(año,t)=>setVSubTab(p=>({...p,[año]:t}));
  const hoy=new Date();hoy.setHours(0,0,0,0);

  const conDatos=vends.filter(v=>v.litros>0||v.viñas?.some(x=>x.kg>0));
  const maxL=Math.max(...conDatos.map(v=>v.litros),1);
  const mejor=[...conDatos].sort((a,b)=>b.litros-a.litros)[0]||null;
  const fSort=[...faenas].filter(f=>f.año===fYear).sort((a,b)=>MORD[a.mes]-MORD[b.mes]||a.id-b.id);
  const proximas=(()=>{
    const cf=[...faenas].map(f=>({...f,_d:parseDate(f.dia)})).filter(f=>f._d&&f._d>=hoy).sort((a,b)=>a._d-b._d);
    if(cf.length>=2)return cf.slice(0,2);
    return[...cf,...fSort.filter(f=>!parseDate(f.dia))].slice(0,2);
  })();

  /* ══ INICIO ══════════════════════════════════════════════════════ */
  function Inicio(){
    const totL=conDatos.reduce((s,v)=>s+v.litros,0);
    const totK=conDatos.reduce((s,v)=>s+v.viñas?.reduce((ss,vn)=>ss+(+vn.kg||0),0),0);
    return(
      <div className="fade">
        <div style={{textAlign:"center",padding:"28px 0 24px",borderBottom:"1px solid var(--br2)",marginBottom:22}}>
          <OriLogo size={62}/>
          <h1 style={{fontFamily:"Montserrat",fontSize:26,fontWeight:700,letterSpacing:".22em",textTransform:"uppercase",color:"var(--gold)",marginTop:14,lineHeight:1}}>{bodega}</h1>
          <p style={{fontFamily:"Montserrat",fontSize:10,fontWeight:500,letterSpacing:".18em",textTransform:"uppercase",color:"var(--tx2)",marginTop:6}}>{lema}</p>
          <p style={{fontFamily:"Montserrat",fontSize:9,color:"var(--tx3)",marginTop:3,letterSpacing:".1em",textTransform:"uppercase"}}>{socios.length} socios · desde 2020</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:24}}>
          {[["⚖️",totK>0?totK.toLocaleString()+"kg":"—","Uva"],["🍶",totL>0?totL.toLocaleString()+"L":"—","Vino"],["📆",String(vends.length),"Vendimias"],["👥",String(socios.length),"Socios"]].map(([ic,v,l],i)=>(
            <div key={i} style={{...S.C,textAlign:"center",padding:"12px 6px"}}>
              <p style={{fontSize:20,marginBottom:3}}>{ic}</p>
              <p style={{fontFamily:"'Crimson Pro',serif",fontSize:19,color:"var(--gold)",lineHeight:1}}>{v}</p>
              <p style={{fontSize:9,fontWeight:600,letterSpacing:".07em",textTransform:"uppercase",color:"var(--tx3)",marginTop:3}}>{l}</p>
            </div>
          ))}
        </div>
        <p style={S.H3}>📅 Próximas faenas</p>
        {proximas.length===0
          ?<div style={{...S.C,textAlign:"center",padding:20,marginBottom:22}}><p style={{fontSize:12,color:"var(--tx3)"}}>Sin fechas asignadas. Ve a Faenas y fija las fechas.</p></div>
          :<div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
            {proximas.map((f,idx)=>{
              const dias=diasR(f.dia);
              const conf=socios.filter(sc=>ga(f.id,sc.id)==="si").length;
              const[exp,setExp]=useState(false);
              const dc=dias===null?"var(--tx3)":dias===0?"rgba(255,220,50,.95)":dias<0?"rgba(200,80,80,.8)":dias<=7?"rgba(255,150,50,.9)":dias<=30?"var(--gold)":"var(--tx3)";
              return(
                <div key={f.id} style={{...S.C,border:"1px solid "+(idx===0?"var(--g35)":"var(--br)")}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:5}}>
                        {idx===0&&<span style={{...S.MB,background:"rgba(232,168,32,.2)"}} className="blink">PRÓXIMA</span>}
                        <span style={{fontSize:17}}>{f.emoji}</span>
                        <span style={{fontFamily:"Montserrat",fontSize:13,fontWeight:700,color:"var(--tx)"}}>{f.nombre}</span>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                        {f.dia?<span style={{fontSize:11,color:"var(--gold)",fontWeight:600}}>📅 {f.dia}</span>:<span style={{fontSize:11,color:"var(--tx3)"}}>Sin fecha · {f.mes}</span>}
                        {dias!==null&&f.dia&&<span style={{fontSize:10,fontWeight:700,color:dc}}>{dias===0?"¡HOY!":dias<0?"Hace "+Math.abs(dias)+"d":dias===1?"Mañana":"En "+dias+"d"}</span>}
                      </div>
                    </div>
                    <div style={{textAlign:"center",background:"var(--g10)",border:"1px solid var(--g20)",borderRadius:5,padding:"7px 9px",flexShrink:0,minWidth:46}}>
                      <p style={{fontFamily:"'Crimson Pro',serif",fontSize:22,color:"var(--gold)",lineHeight:1}}>{conf}</p>
                      <p style={{fontSize:9,color:"var(--tx3)",fontWeight:600}}>/{socios.length} sí</p>
                    </div>
                  </div>
                  <SocioBotones fid={f.id} socios={socios} asist={asist} toggle={ta}/>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginTop:10}}>
                    <p style={{fontSize:11,color:"var(--tx3)",lineHeight:1.5,flex:1,marginRight:8}}>{exp?f.desc:f.desc.slice(0,60)+(f.desc.length>60?"…":"")}</p>
                    <button className="be" style={{fontSize:9,flexShrink:0}} onClick={()=>setExp(!exp)}>{exp?"Menos":"Ver más"}</button>
                  </div>
                </div>
              );
            })}
          </div>
        }
        {conDatos.length>0&&(
          <>
            <p style={S.H3}>Producción por año</p>
            <div style={{...S.C,marginBottom:22}}>
              {[...conDatos].sort((a,b)=>a.año-b.año).map(v=>(
                <div key={v.año} style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
                  <span style={{fontFamily:"Montserrat",fontSize:11,fontWeight:600,color:"var(--gold)",width:34,flexShrink:0}}>{v.año}</span>
                  <div style={{flex:1,height:22,background:"rgba(255,255,255,.04)",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:((v.litros/maxL)*100)+"%",background:"linear-gradient(90deg,rgba(232,168,32,.5),var(--gold))",borderRadius:4,display:"flex",alignItems:"center",paddingLeft:7}}>
                      <span style={{fontSize:10,fontWeight:700,color:"#0D0D0D"}}>{v.litros}L</span>
                    </div>
                  </div>
                  <span style={{fontSize:10,color:"var(--tx3)",width:46,textAlign:"right",flexShrink:0}}>{v.viñas?.reduce((ss,x)=>ss+(+x.kg||0),0)}kg</span>
                </div>
              ))}
            </div>
          </>
        )}
        <p style={S.H3}>Los socios</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
          {socios.map(sc=>(
            <div key={sc.id} style={{display:"flex",alignItems:"center",gap:8,...S.C,padding:"9px 13px",flex:"1 1 auto",minWidth:130}}>
              <Av nombre={sc.nombre} size={34}/>
              <div><p style={{fontFamily:"Montserrat",fontSize:13,fontWeight:600,color:"var(--tx)"}}>{sc.nombre}{sc.apodo?" "+sc.apodo:""}</p><p style={{fontSize:10,color:"var(--gold)",textTransform:"uppercase",letterSpacing:".06em"}}>{sc.rol}</p></div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  /* ══ INVENTARIO ══════════════════════════════════════════════════ */
  function Inventario(){
    const totalItems=invCat.reduce((s,c)=>s+c.items.length,0);
    return(
      <div className="fade">
        <h2 style={S.H2}>Inventario</h2>
        <p style={S.DSC}>Material y herramientas · {totalItems} artículos registrados</p>
        {invCat.map(cat=>{
          const isO=openCat===cat.id;
          return(
            <div key={cat.id} style={{marginBottom:isO?0:10}}>
              <div className={"vc card "+(isO?"op":"")} style={{...S.C}} onClick={()=>setOpenCat(isO?null:cat.id)}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:22}}>{cat.emoji}</span><span style={{fontFamily:"Montserrat",fontSize:14,fontWeight:700,color:"var(--tx)"}}>{cat.nombre}</span></div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontFamily:"'Crimson Pro',serif",fontSize:20,color:"var(--gold)"}}>{cat.items.length}</span><span style={{fontSize:10,color:"var(--gold)"}}>{isO?"▲":"▼"}</span></div>
                </div>
                {cat.items.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:10}}>{cat.items.slice(0,4).map(it=><span key={it.id} style={{fontSize:10,background:"var(--g10)",border:"1px solid var(--g20)",color:"var(--tx2)",padding:"2px 8px",borderRadius:4}}>{it.nombre}: <span style={{color:"var(--gold)",fontWeight:600}}>{it.unidades}</span></span>)}{cat.items.length>4&&<span style={{fontSize:10,color:"var(--tx3)"}}>+{cat.items.length-4} más</span>}</div>}
              </div>
              {isO&&(
                <div style={S.DB}>
                  {cat.items.length>0?(
                    <div style={{marginBottom:12}}>
                      {cat.items.map(it=>{
                        const isE=editItem&&editItem.catId===cat.id&&editItem.itemId===it.id;
                        return(
                          <div key={it.id} style={{background:"var(--bg2)",border:"1px solid var(--br2)",borderRadius:5,padding:"9px 11px",display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                            {isE?(
                              <><input value={it.nombre} style={{flex:2}} onChange={e=>setInvCat(p=>p.map(c=>c.id===cat.id?{...c,items:c.items.map(i=>i.id===it.id?{...i,nombre:e.target.value}:i)}:c))}/><input value={it.unidades} style={{flex:1,textAlign:"center"}} placeholder="Uds." onChange={e=>setInvCat(p=>p.map(c=>c.id===cat.id?{...c,items:c.items.map(i=>i.id===it.id?{...i,unidades:e.target.value}:i)}:c))}/><button className="be" style={{flexShrink:0}} onClick={()=>setEditItem(null)}>✓</button></>
                            ):(
                              <><div style={{flex:1}}><span style={{fontSize:12,fontWeight:600,color:"var(--tx)"}}>{it.nombre}</span></div><span style={{fontFamily:"'Crimson Pro',serif",fontSize:20,color:"var(--gold)",marginRight:4}}>{it.unidades}</span><span style={{fontSize:10,color:"var(--tx3)",marginRight:4}}>uds.</span><button className="be" style={{padding:"3px 8px",fontSize:10}} onClick={()=>setEditItem({catId:cat.id,itemId:it.id})}>✏️</button><button className="bd" style={{padding:"3px 8px",fontSize:10}} onClick={()=>setInvCat(p=>p.map(c=>c.id===cat.id?{...c,items:c.items.filter(i=>i.id!==it.id)}:c))}>✕</button></>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  ):<p style={{fontSize:12,color:"var(--tx3)",marginBottom:12,textAlign:"center"}}>Sin artículos registrados.</p>}
                  {addItem===cat.id?(
                    <div style={{background:"var(--bg2)",border:"1px solid var(--g20)",borderRadius:6,padding:12}}>
                      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:8,marginBottom:8}}>
                        <input placeholder="Nombre del material / herramienta" value={nItem.nombre} onChange={e=>setNItem(p=>({...p,nombre:e.target.value}))}/>
                        <input placeholder="Uds." value={nItem.unidades} onChange={e=>setNItem(p=>({...p,unidades:e.target.value}))}/>
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        <button className="bg" onClick={()=>{if(!nItem.nombre)return;setInvCat(p=>p.map(c=>c.id===cat.id?{...c,items:[...c.items,{id:Date.now(),...nItem}]}:c));setNItem({nombre:"",unidades:""});setAddItem(null);}}>Guardar</button>
                        <button className="bo" onClick={()=>{setAddItem(null);setNItem({nombre:"",unidades:""});}}>Cancelar</button>
                      </div>
                    </div>
                  ):<button className="bg" style={{width:"100%",padding:9}} onClick={()=>setAddItem(cat.id)}>+ Añadir artículo</button>}
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  }

  /* ══ VENDIMIAS ════════════════════════════════════════════════════ */
  function Vendimias(){
    function rGeneral(v){
      return(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <RowItem label="Fecha de vendimia"><input value={v.fechaVendimia||""} placeholder="dd/mm/aaaa" onChange={e=>sv(v.año,"fechaVendimia",e.target.value)}/></RowItem>
            <RowItem label="Litros de vino"><input type="number" value={v.litros||""} placeholder="0" onChange={e=>sv(v.año,"litros",+e.target.value)}/></RowItem>
            <RowItem label="Densidad (g/L)"><input value={v.densidad||""} placeholder="—" onChange={e=>sv(v.año,"densidad",e.target.value)}/></RowItem>
            <RowItem label="PH"><input value={v.ph||""} placeholder="—" onChange={e=>sv(v.año,"ph",e.target.value)}/></RowItem>
          </div>
          <RowItem label="Variedades">
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}}>
              {VARIEDADES.map(va=>{const sel=(v.variedades||[]).includes(va);return<button key={va} style={{background:sel?"var(--g20)":"transparent",border:"1px solid "+(sel?"var(--g50)":"var(--br2)"),borderRadius:5,padding:"5px 12px",cursor:"pointer",fontFamily:"Montserrat",fontSize:11,fontWeight:600,color:sel?"var(--gold)":"var(--tx2)"}} onClick={()=>{const c=v.variedades||[];sv(v.año,"variedades",sel?c.filter(x=>x!==va):[...c,va]);}}>{va}</button>;})}
            </div>
          </RowItem>
          <RowItem label="Notas generales"><textarea rows={3} value={v.notas||""} placeholder="Observaciones generales…" onChange={e=>sv(v.año,"notas",e.target.value)}/></RowItem>
        </div>
      );
    }

    function rViñas(v){
      return(
        <div>
          {(v.viñas||[]).map((vn,i)=>(
            <div key={vn.nombre} style={{...S.C,marginBottom:10}}>
              <p style={{fontFamily:"Montserrat",fontSize:13,fontWeight:700,color:"var(--gold)",marginBottom:12}}>🍇 {vn.nombre}</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <RowItem label="Kg cosechados"><input type="number" value={vn.kg||""} placeholder="0" onChange={e=>{const nv=[...v.viñas];nv[i]={...vn,kg:+e.target.value};sv(v.año,"viñas",nv);}}/></RowItem>
                <RowItem label="Variedad principal"><select value={vn.variedad||"Garnacha"} onChange={e=>{const nv=[...v.viñas];nv[i]={...vn,variedad:e.target.value};sv(v.año,"viñas",nv);}}>{VARIEDADES.map(va=><option key={va}>{va}</option>)}</select></RowItem>
              </div>
            </div>
          ))}
          <div style={{...S.C,background:"rgba(232,168,32,.05)"}}><p style={{fontSize:11,color:"var(--tx2)"}}>Total: <span style={{color:"var(--gold)",fontWeight:700}}>{(v.viñas||[]).reduce((s,x)=>s+(+x.kg||0),0)} kg</span></p></div>
        </div>
      );
    }

    function rCampo(v){
      return(
        <div>
          <p style={{fontSize:12,color:"var(--tx2)",marginBottom:12}}>Registro acumulado de mediciones en campo.</p>
          {(v.medicionesCampo||[]).length===0&&showMed!==v.año&&<p style={{fontSize:12,color:"var(--tx3)",textAlign:"center",margin:"16px 0"}}>Sin mediciones registradas.</p>}
          {(v.medicionesCampo||[]).map(m=>(
            <EntradaLog key={m.id} fecha={m.fecha}
              titulo={"Alcohol prob.: "+(m.alcohol||"—")+"% · PH: "+(m.ph||"—")}
              extra={m.comentario}
              onDel={()=>sv(v.año,"medicionesCampo",(v.medicionesCampo||[]).filter(x=>x.id!==m.id))}/>
          ))}
          {showMed===v.año
            ?<FormMedicion onSave={data=>{sv(v.año,"medicionesCampo",[...(v.medicionesCampo||[]),data]);setShowMed(null);}} onCancel={()=>setShowMed(null)}/>
            :<button className="bg" style={{width:"100%",padding:10,marginTop:8}} onClick={()=>setShowMed(v.año)}>+ Añadir medición de campo</button>
          }
        </div>
      );
    }

    function rSulfuroso(v){
      const total=(v.sulfuroso||[]).reduce((s,x)=>s+(+x.dosis||0),0);
      return(
        <div>
          <p style={{fontSize:12,color:"var(--tx2)",marginBottom:8}}>Registro acumulado de adiciones de SO₂.</p>
          {total>0&&<p style={{fontSize:11,color:"var(--gold)",fontWeight:600,marginBottom:12}}>Total acumulado: {total} mg/L</p>}
          {(v.sulfuroso||[]).length===0&&showSulf!==v.año&&<p style={{fontSize:12,color:"var(--tx3)",textAlign:"center",margin:"16px 0"}}>Sin adiciones registradas.</p>}
          {(v.sulfuroso||[]).map(s=>(
            <EntradaLog key={s.id} fecha={s.fecha}
              titulo={"Dosis: "+(s.dosis||"—")+" mg/L"}
              extra={s.comentario}
              onDel={()=>sv(v.año,"sulfuroso",(v.sulfuroso||[]).filter(x=>x.id!==s.id))}/>
          ))}
          {showSulf===v.año
            ?<FormSulfuroso onSave={data=>{sv(v.año,"sulfuroso",[...(v.sulfuroso||[]),data]);setShowSulf(null);}} onCancel={()=>setShowSulf(null)}/>
            :<button className="bg" style={{width:"100%",padding:10,marginTop:8}} onClick={()=>setShowSulf(v.año)}>+ Registrar adición de sulfuroso</button>
          }
        </div>
      );
    }

    function rAnalisis(v){
      const lista=v.analisis||[];
      return(
        <div>
          <p style={{fontSize:12,color:"var(--tx2)",marginBottom:12}}>Historial de análisis de laboratorio. Cada análisis incluye enlace al PDF en Drive.</p>
          {lista.length===0&&showAnal!==v.año&&(
            <p style={{fontSize:12,color:"var(--tx3)",textAlign:"center",margin:"16px 0"}}>Sin análisis registrados.</p>
          )}

          {/* Lista de análisis */}
          {lista.map(an=>{
            const key=v.año+"-"+an.id;
            const isOpen=openAnal===key;
            return(
              <div key={an.id} style={{marginBottom:8}}>
                <div className={"vc card "+(isOpen?"op":"")} style={{...S.C,padding:"11px 13px"}} onClick={()=>setOpenAnal(isOpen?null:key)}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{flex:1}}>
                      {an.fecha&&<p style={{fontSize:10,color:"var(--gold)",fontWeight:600,marginBottom:4}}>📅 {an.fecha}</p>}
                      <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
                        {an.alcohol&&<span style={{fontSize:12,color:"var(--tx)"}}><span style={{color:"var(--tx3)",fontSize:10}}>Alcohol </span>{an.alcohol}%</span>}
                        {an.ph&&<span style={{fontSize:12,color:"var(--tx)"}}><span style={{color:"var(--tx3)",fontSize:10}}>PH </span>{an.ph}</span>}
                        {an.densidad&&<span style={{fontSize:12,color:"var(--tx)"}}><span style={{color:"var(--tx3)",fontSize:10}}>Dens. </span>{an.densidad}</span>}
                        {an.sulfurosoTotal&&<span style={{fontSize:12,color:"var(--tx)"}}><span style={{color:"var(--tx3)",fontSize:10}}>SO₂t </span>{an.sulfurosoTotal}</span>}
                      </div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                      {an.driveLink&&(
                        <button style={{background:"transparent",border:"none",cursor:"pointer",fontSize:22,padding:"0 2px"}} title="Abrir PDF en Google Drive"
                          onClick={e=>{e.stopPropagation();window.open(an.driveLink,"_blank");}}>📄</button>
                      )}
                      <span style={{fontSize:10,color:"var(--gold)"}}>{isOpen?"▲":"▼"}</span>
                    </div>
                  </div>
                </div>
                {isOpen&&(
                  <div style={S.DB}>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:10}}>
                      {CAMPOS_AN.map(([label,key,unit])=>an[key]?(
                        <div key={key}>
                          <span style={S.LB}>{label}{unit?" ("+unit+")":""}</span>
                          <p style={{fontFamily:"'Crimson Pro',serif",fontSize:20,color:"var(--tx)"}}>{an[key]}</p>
                        </div>
                      ):null)}
                    </div>
                    {an.driveLink&&(
                      <button className="bg" style={{width:"100%",padding:9,marginBottom:10}} onClick={()=>window.open(an.driveLink,"_blank")}>
                        📄 Abrir PDF en Google Drive
                      </button>
                    )}
                    <button className="bd" onClick={()=>{if(window.confirm("¿Eliminar este análisis?"))sv(v.año,"analisis",lista.filter(x=>x.id!==an.id));}}>Eliminar análisis</button>
                  </div>
                )}
              </div>
            );
          })}

          {showAnal===v.año
            ?<FormAnalisis onSave={data=>{sv(v.año,"analisis",[...(v.analisis||[]),data]);setShowAnal(null);}} onCancel={()=>setShowAnal(null)}/>
            :<button className="bg" style={{width:"100%",padding:10,marginTop:8}} onClick={()=>setShowAnal(v.año)}>+ Añadir nuevo análisis</button>
          }
        </div>
      );
    }

    function rHitos(v){
      const todos=[
        ...(v.hitos||[]).map(h=>({...h,_t:"hito"})),
        ...(v.medicionesCampo||[]).map(m=>({...m,_t:"campo",descripcion:"Campo — Alcohol: "+(m.alcohol||"—")+"% · PH: "+(m.ph||"—")+(m.comentario?" · "+m.comentario:"")})),
        ...(v.sulfuroso||[]).map(s=>({...s,_t:"sulf",descripcion:"Sulfuroso — "+(s.dosis||"—")+" mg/L"+(s.comentario?" · "+s.comentario:"")})),
        ...(v.analisis||[]).map(a=>({...a,_t:"anal",descripcion:"Análisis laboratorio — Alcohol: "+(a.alcohol||"—")+"% · PH: "+(a.ph||"—")})),
      ].sort((a,b)=>{const da=parseDate(a.fecha),db=parseDate(b.fecha);if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;return da-db;});
      const iconT={hito:"📌",campo:"🔬",sulf:"🧪",anal:"📊"};
      return(
        <div>
          <p style={{fontSize:12,color:"var(--tx2)",marginBottom:12}}>Línea de tiempo de todas las intervenciones de la vendimia {v.año}.</p>
          {todos.length===0&&showHito!==v.año&&<p style={{fontSize:12,color:"var(--tx3)",textAlign:"center",margin:"16px 0"}}>Sin hitos registrados.</p>}
          {todos.map((h,i)=>(
            <div key={h.id||i} style={{display:"flex",gap:10,marginBottom:8}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:"var(--g10)",border:"1px solid var(--g20)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>{iconT[h._t]||"📌"}</div>
                {i<todos.length-1&&<div style={{width:1,flex:1,background:"var(--br2)",margin:"3px 0"}}/>}
              </div>
              <div style={{flex:1,paddingBottom:8}}>
                {h.fecha&&<p style={{fontSize:10,color:"var(--gold)",fontWeight:600,marginBottom:2}}>📅 {h.fecha}</p>}
                <p style={{fontSize:12,color:"var(--tx)",lineHeight:1.5}}>{h.descripcion}</p>
                {h._t==="hito"&&<button className="bd" style={{padding:"2px 7px",fontSize:9,marginTop:4}} onClick={()=>sv(v.año,"hitos",(v.hitos||[]).filter(x=>x.id!==h.id))}>✕</button>}
              </div>
            </div>
          ))}
          {showHito===v.año
            ?<FormHito onSave={data=>{sv(v.año,"hitos",[...(v.hitos||[]),data]);setShowHito(null);}} onCancel={()=>setShowHito(null)}/>
            :<button className="bg" style={{width:"100%",padding:10,marginTop:8}} onClick={()=>setShowHito(v.año)}>+ Añadir hito o intervención</button>
          }
        </div>
      );
    }

    return(
      <div className="fade">
        <h2 style={S.H2}>Vendimias</h2>
        <p style={S.DSC}>Viñas: Grío · Quebracántaros · Toca una añada para gestionar</p>
        {vends.map(v=>{
          const kg=(v.viñas||[]).reduce((s,x)=>s+(+x.kg||0),0);
          const isO=openV===v.año;
          const vt=getVT(v.año);
          return(
            <div key={v.año} style={{marginBottom:isO?0:8}}>
              <div className={"vc card "+(isO?"op":"")} style={{...S.C}} onClick={()=>setOpenV(isO?null:v.año)}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                      <span style={{fontFamily:"'Crimson Pro',serif",fontSize:32,color:"var(--gold)",lineHeight:1}}>{v.año}</span>
                      {mejor&&v.año===mejor.año&&v.litros>0&&<span style={S.TG}>🏆 MEJOR</span>}
                      {kg===0&&!v.litros&&<span style={{fontSize:10,color:"var(--tx3)"}}>Sin datos aún</span>}
                    </div>
                    {v.fechaVendimia&&<p style={{fontSize:11,color:"var(--tx2)"}}>🍇 {v.fechaVendimia}</p>}
                    {(v.variedades||[]).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>{v.variedades.map(va=><span key={va} style={S.TG}>{va}</span>)}</div>}
                    {kg>0&&<div style={{display:"flex",gap:8,marginTop:6}}>{(v.viñas||[]).filter(x=>x.kg>0).map(x=><span key={x.nombre} style={{fontSize:10,color:"var(--tx2)"}}>{x.nombre}: <span style={{color:"var(--gold)",fontWeight:600}}>{x.kg}kg</span></span>)}</div>}
                  </div>
                  <div style={{textAlign:"right"}}>
                    {v.litros>0&&<p style={{fontFamily:"'Crimson Pro',serif",fontSize:22,color:"var(--tx)"}}>{v.litros} L</p>}
                    {kg>0&&<p style={{fontSize:11,color:"var(--tx2)"}}>{kg} kg total</p>}
                    {(v.analisis||[]).length>0&&<p style={{fontSize:10,color:"var(--tx3)",marginTop:4}}>📊 {v.analisis.length} análisis</p>}
                    <p style={{fontSize:10,color:"var(--gold)",marginTop:6}}>{isO?"▲ Cerrar":"▼ Gestionar"}</p>
                  </div>
                </div>
              </div>
              {isO&&(
                <div style={S.DB}>
                  <div style={{display:"flex",overflowX:"auto",gap:3,marginBottom:16,paddingBottom:10,borderBottom:"1px solid var(--br2)"}}>
                    {V_TABS.map(vt2=><button key={vt2.id} className={"vtb "+(vt===vt2.id?"a":"")} onClick={e=>{e.stopPropagation();setVT(v.año,vt2.id);}}>{vt2.l}</button>)}
                  </div>
                  {vt==="general"   &&rGeneral(v)}
                  {vt==="vinas"     &&rViñas(v)}
                  {vt==="campo"     &&rCampo(v)}
                  {vt==="sulfuroso" &&rSulfuroso(v)}
                  {vt==="analisis"  &&rAnalisis(v)}
                  {vt==="hitos"     &&rHitos(v)}
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  }

  /* ══ FAENAS ═══════════════════════════════════════════════════════ */
  function Faenas(){
    const mesAct=MESES[new Date().getMonth()];
    const porMes=MESES.reduce((acc,m)=>{const fs=fSort.filter(f=>f.mes===m);if(fs.length)acc[m]=fs;return acc;},{});
    function copiar(){
      const ant=faenas.filter(f=>f.año===fYear-1);
      if(!ant.length){alert("No hay faenas del año "+(fYear-1)+" para copiar.");return;}
      setFaenas(p=>[...p,...ant.map(f=>({...f,id:Date.now()+Math.random(),año:fYear,dia:""}))]);
    }
    return(
      <div className="fade">
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          <h2 style={{...S.H2,marginBottom:0}}>Faenas</h2>
          <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:"auto"}}>
            <button className="bo" style={{padding:"5px 10px"}} onClick={()=>setFYear(y=>y-1)}>◀</button>
            <span style={{fontFamily:"'Crimson Pro',serif",fontSize:24,color:"var(--gold)",minWidth:48,textAlign:"center"}}>{fYear}</span>
            <button className="bo" style={{padding:"5px 10px"}} onClick={()=>setFYear(y=>y+1)}>▶</button>
          </div>
        </div>
        {fSort.length===0?(
          <div style={{...S.C,textAlign:"center",padding:24,marginBottom:16}}>
            <p style={{fontSize:13,color:"var(--tx2)",marginBottom:14}}>No hay faenas para {fYear}.</p>
            <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
              <button className="bg" onClick={copiar}>Copiar de {fYear-1}</button>
              <button className="bo" onClick={()=>setAddF(true)}>+ Crear primera faena</button>
            </div>
          </div>
        ):(
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
            <p style={S.DSC}>Toca un socio para confirmar · Toca texto para editar</p>
            <div style={{display:"flex",gap:6}}><button className="bo" style={{fontSize:9}} onClick={copiar}>Copiar de {fYear-1}</button><button className="bg" onClick={()=>setAddF(!addF)}>+ Añadir</button></div>
          </div>
        )}
        {addF&&(
          <div style={{...S.DB,borderRadius:7,borderTop:"1px solid var(--br)",marginBottom:12,padding:14}}>
            <p style={{...S.H3,marginBottom:12}}>Nueva faena · {fYear}</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 52px 1fr",gap:8}}>
              <input placeholder="Nombre" value={nF.nombre} onChange={e=>setNF(p=>({...p,nombre:e.target.value}))}/>
              <input placeholder="🍇" value={nF.emoji} style={{textAlign:"center"}} onChange={e=>setNF(p=>({...p,emoji:e.target.value}))}/>
              <select value={nF.mes} onChange={e=>setNF(p=>({...p,mes:e.target.value}))}>{MESES.map(m=><option key={m}>{m}</option>)}</select>
            </div>
            <textarea rows={2} placeholder="Descripción" style={{marginTop:8}} value={nF.desc} onChange={e=>setNF(p=>({...p,desc:e.target.value}))}/>
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button className="bg" onClick={()=>{if(!nF.nombre)return;setFaenas(p=>[...p,{id:Date.now(),año:fYear,...nF,dia:""}]);setNF({nombre:"",emoji:"",mes:"Enero",desc:""});setAddF(false);}}>Guardar</button>
              <button className="bo" onClick={()=>setAddF(false)}>Cancelar</button>
            </div>
          </div>
        )}
        {Object.entries(porMes).map(([mes,flist])=>(
          <div key={mes} style={{marginBottom:22}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,paddingBottom:7,borderBottom:"1px solid var(--br2)"}}>
              <span style={{fontFamily:"Montserrat",fontSize:14,fontWeight:700,letterSpacing:".14em",textTransform:"uppercase",color:mes===mesAct?"var(--gold)":"var(--tx2)"}}>{mes}</span>
              {mes===mesAct&&<span style={S.MB}>MES ACTUAL</span>}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              {flist.map(f=>{
                const conf=socios.filter(sc=>ga(f.id,sc.id)==="si").length;
                const dias=diasR(f.dia);
                const dc=dias===null?"var(--tx3)":dias===0?"rgba(255,220,50,.95)":dias<0?"rgba(200,80,80,.7)":dias<=7?"rgba(255,150,50,.9)":dias<=30?"var(--gold)":"var(--tx3)";
                return(
                  <div key={f.id} style={{...S.C}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:10}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4,flexWrap:"wrap"}}>
                          <InlineEdit value={f.emoji||"🔧"} onChange={val=>sf(f.id,"emoji",val)} style={{fontSize:18}}/>
                          <InlineEdit value={f.nombre} onChange={val=>sf(f.id,"nombre",val)} style={{fontFamily:"Montserrat",fontSize:13,fontWeight:700,color:"var(--tx)"}} placeholder="Nombre"/>
                          {editFmes===f.id?<select value={f.mes} onChange={e=>sf(f.id,"mes",e.target.value)} style={{width:120,padding:"3px 6px",fontSize:11}}>{MESES.map(m=><option key={m}>{m}</option>)}</select>:<span style={S.MB} className="editable" onClick={()=>setEditFmes(f.id)}>{f.mes}</span>}
                        </div>
                        <InlineEdit value={f.desc} onChange={val=>sf(f.id,"desc",val)} style={{fontSize:11,color:"var(--tx2)",lineHeight:1.55,display:"block",marginBottom:8}} placeholder="Descripción…" multiline/>
                        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                          <span style={{fontSize:10,fontWeight:600,color:"var(--gold)"}}>📅</span>
                          <InlineEdit value={f.dia} onChange={val=>sf(f.id,"dia",val)} style={{fontSize:11,color:f.dia?"var(--tx)":"var(--tx3)"}} placeholder="Toca para fijar fecha"/>
                          {dias!==null&&f.dia&&<span style={{fontSize:10,fontWeight:700,color:dc}}>{dias===0?"¡HOY!":dias<0?"Hace "+Math.abs(dias)+"d":dias===1?"Mañana":"En "+dias+"d"}</span>}
                        </div>
                      </div>
                      <div style={{textAlign:"center",background:"var(--g10)",border:"1px solid var(--g20)",borderRadius:5,padding:"7px 9px",flexShrink:0,minWidth:46}}>
                        <p style={{fontFamily:"'Crimson Pro',serif",fontSize:22,color:"var(--gold)",lineHeight:1}}>{conf}</p>
                        <p style={{fontSize:9,color:"var(--tx3)",fontWeight:600}}>/{socios.length}</p>
                      </div>
                    </div>
                    <SocioBotones fid={f.id} socios={socios} asist={asist} toggle={ta}/>
                    <div style={{display:"flex",justifyContent:"flex-end",gap:6,marginTop:10}}>
                      {editFmes===f.id&&<button className="be" onClick={()=>setEditFmes(null)}>✓ Listo</button>}
                      <button className="bd" onClick={()=>{if(window.confirm("¿Eliminar "+f.nombre+"?"))setFaenas(p=>p.filter(x=>x.id!==f.id));}}>Eliminar</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    );
  }

  /* ══ SOCIOS ══════════════════════════════════════════════════════ */
  function Socios(){
    return(
      <div className="fade">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,flexWrap:"wrap",gap:8}}>
          <div><h2 style={S.H2}>Socios</h2><p style={S.DSC}>Toca cualquier dato para editarlo</p></div>
          <button className="bg" onClick={()=>setAddS(!addS)}>+ Añadir</button>
        </div>
        {addS&&(
          <div style={{...S.DB,borderRadius:7,borderTop:"1px solid var(--br)",marginBottom:12,padding:14}}>
            <p style={{...S.H3,marginBottom:12}}>Nuevo socio</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              <input placeholder="Nombre" value={nS.nombre} onChange={e=>setNS(p=>({...p,nombre:e.target.value}))}/>
              <input placeholder="(Padre)…" value={nS.apodo} onChange={e=>setNS(p=>({...p,apodo:e.target.value}))}/>
              <input placeholder="Rol" value={nS.rol} onChange={e=>setNS(p=>({...p,rol:e.target.value}))}/>
            </div>
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button className="bg" onClick={()=>{if(!nS.nombre)return;setSocios(p=>[...p,{id:Date.now(),...nS}]);setNS({nombre:"",apodo:"",rol:""});setAddS(false);}}>Guardar</button>
              <button className="bo" onClick={()=>setAddS(false)}>Cancelar</button>
            </div>
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:10}}>
          {socios.map(sc=>{
            const conf=faenas.filter(f=>ga(f.id,sc.id)==="si").length;
            const pct=faenas.length>0?Math.round((conf/faenas.length)*100):0;
            const yes=faenas.filter(f=>ga(f.id,sc.id)==="si").map(f=>f.nombre);
            return(
              <div key={sc.id} className="card" style={{...S.C,textAlign:"center",padding:"18px 12px"}}>
                <Av nombre={sc.nombre} size={50}/>
                <div style={{marginTop:10,marginBottom:4}}>
                  <InlineEdit value={sc.nombre} onChange={v=>ss(sc.id,"nombre",v)} style={{fontFamily:"Montserrat",fontSize:14,fontWeight:700,color:"var(--tx)",display:"block"}} placeholder="Nombre"/>
                  <InlineEdit value={sc.apodo}  onChange={v=>ss(sc.id,"apodo",v)}  style={{fontSize:11,color:"var(--tx2)",display:"block",marginTop:1}} placeholder="(apodo)"/>
                  <InlineEdit value={sc.rol}    onChange={v=>ss(sc.id,"rol",v)}    style={{fontSize:10,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"var(--gold)",display:"block",marginTop:3}} placeholder="Rol"/>
                </div>
                <div style={{display:"flex",justifyContent:"space-around",borderTop:"1px solid var(--br2)",paddingTop:10,margin:"10px 0"}}>
                  <div><p style={{fontFamily:"'Crimson Pro',serif",fontSize:22,color:"var(--gold)"}}>{conf}</p><p style={{fontSize:9,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"var(--tx3)"}}>Faenas</p></div>
                  <div><p style={{fontFamily:"'Crimson Pro',serif",fontSize:22,color:"var(--gold)"}}>{pct}%</p><p style={{fontSize:9,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"var(--tx3)"}}>Partic.</p></div>
                </div>
                {yes.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:3,justifyContent:"center",marginBottom:10}}>{yes.slice(0,3).map(n=><span key={n} style={{fontSize:9,background:"rgba(45,122,62,.14)",border:"1px solid rgba(45,122,62,.3)",color:"rgba(100,210,130,.9)",padding:"2px 5px",borderRadius:3,fontWeight:600}}>✅ {n}</span>)}{yes.length>3&&<span style={{fontSize:9,color:"var(--tx3)"}}>+{yes.length-3}</span>}</div>}
                <button className="bd" style={{width:"100%"}} onClick={()=>{if(window.confirm("¿Eliminar a "+sc.nombre+"?"))setSocios(p=>p.filter(x=>x.id!==sc.id));}}>Eliminar</button>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  /* ══ CONFIG ══════════════════════════════════════════════════════ */
  function Config(){
    return(
      <div className="fade">
        <h2 style={S.H2}>Configuración</h2>
        <p style={S.DSC}>Datos generales de la bodega</p>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={S.C}><span style={S.LB}>Nombre de la bodega</span><input value={bodega} onChange={e=>setBodega(e.target.value)} placeholder="Bodega Orioles"/></div>
          <div style={S.C}><span style={S.LB}>Lema / Subtítulo</span><input value={lema} onChange={e=>setLema(e.target.value)} placeholder="Quebracántaros · Valdejalón"/></div>
          <div style={S.C}>
            <p style={{...S.H3,marginBottom:6}}>📲 Instalar app</p>
            <p style={{fontSize:12,color:"var(--tx2)",lineHeight:1.7,marginBottom:10}}>Instala Bodega Orioles en la pantalla de inicio para usarla sin navegador.</p>
            <button className="bg" style={{width:"100%",padding:11}} onClick={()=>window.triggerInstall&&window.triggerInstall()}>📲 Instalar en este móvil</button>
            <p style={{fontSize:11,color:"var(--tx3)",marginTop:8,lineHeight:1.6}}>Si no funciona: Chrome → Menú ⋮ → "Añadir a pantalla de inicio"</p>
          </div>
          <div style={S.C}>
            <p style={{...S.H3,marginBottom:6}}>⬇ Copia de seguridad</p>
            <button className="bg" style={{width:"100%",padding:10}} onClick={()=>{
              const data={socios,vendimias:vends,faenas,asistencia:asist,inventario:invCat,bodega,lema};
              const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
              const a=document.createElement("a");a.href=URL.createObjectURL(blob);
              a.download="orioles-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();
            }}>⬇ Descargar backup JSON</button>
          </div>
          <div style={S.C}>
            <p style={{...S.H3,marginBottom:8}}>El logo · 7 pájaros</p>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <OriLogo size={48}/>
              <p style={{fontSize:12,color:"var(--tx2)",lineHeight:1.7}}>Extraído de vuestra etiqueta <em>Quebracántaros</em>. 7 triángulos y rombos en ámbar sobre negro.</p>
            </div>
          </div>
        </div>
      </div>
    );
  }

  const TABS=[{id:"inicio",l:"Inicio"},{id:"inventario",l:"Inventario"},{id:"vendimias",l:"Vendimias"},{id:"faenas",l:"Faenas"},{id:"socios",l:"Socios"},{id:"config",l:"Config"}];

  return(
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <header style={{background:"#0D0D0D",borderBottom:"1px solid rgba(232,168,32,.14)",padding:"11px 16px",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:12,maxWidth:820,margin:"0 auto"}}>
          <OriLogo size={30}/>
          <div>
            <h1 style={{fontFamily:"Montserrat",fontSize:16,fontWeight:700,letterSpacing:".22em",textTransform:"uppercase",color:"var(--gold)",lineHeight:1}}>ORIOLES</h1>
            <p style={{fontSize:9,fontWeight:500,letterSpacing:".14em",textTransform:"uppercase",color:"var(--tx2)",marginTop:2}}>{lema}</p>
          </div>
        </div>
      </header>
      <nav style={{display:"flex",overflowX:"auto",gap:2,padding:"5px 10px",borderBottom:"1px solid var(--br2)",background:"#111",position:"sticky",top:53,zIndex:49}}>
        {TABS.map(t=><button key={t.id} className={"tb "+(tab===t.id?"a":"")} onClick={()=>setTab(t.id)}>{t.l}</button>)}
      </nav>
      <main style={{padding:"20px 14px 64px",maxWidth:820,margin:"0 auto"}}>
        {tab==="inicio"     &&<Inicio/>}
        {tab==="inventario" &&<Inventario/>}
        {tab==="vendimias"  &&<Vendimias/>}
        {tab==="faenas"     &&<Faenas/>}
        {tab==="socios"     &&<Socios/>}
        {tab==="config"     &&<Config/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if("serviceWorker"in navigator&&location.protocol==="https:"){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js").then(reg=>{
      reg.addEventListener("updatefound",()=>{const sw=reg.installing;sw.addEventListener("statechange",()=>{if(sw.state==="installed"&&navigator.serviceWorker.controller)sw.postMessage("SKIP_WAITING");});});
    }).catch(e=>console.warn("SW:",e));
    navigator.serviceWorker.addEventListener("controllerchange",()=>window.location.reload());
  });
}
let dp=null;const bn=document.getElementById("ib");
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();dp=e;bn.style.display="flex";});
function triggerInstall(){if(dp){dp.prompt();dp.userChoice.then(()=>{dp=null;bn.style.display="none";});}else{alert("Android: Chrome → Menú ⋮ → Añadir a pantalla de inicio\niPhone: Safari → Compartir → Añadir a pantalla de inicio");}}
window.triggerInstall=triggerInstall;
document.getElementById("ibb").addEventListener("click",triggerInstall);
document.getElementById("ibc").addEventListener("click",()=>{bn.style.display="none";});
window.addEventListener("appinstalled",()=>{bn.style.display="none";});
</script>
</body>
</html>
