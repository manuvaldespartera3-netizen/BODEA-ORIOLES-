<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bodega Orioles</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0D0D0D" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Orioles" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:      #0D0D0D;
      --bg2:     #131313;
      --surface: #1A1A1A;
      --surf2:   #222222;
      --gold:    #E8A820;
      --gold2:   #F0B429;
      --gd15:    rgba(232,168,32,.15);
      --gd25:    rgba(232,168,32,.25);
      --gd40:    rgba(232,168,32,.40);
      --text:    #F0EAD6;
      --text2:   rgba(240,234,214,.55);
      --text3:   rgba(240,234,214,.3);
      --border:  rgba(232,168,32,.18);
      --border2: rgba(255,255,255,.06);
      --green:   #2d7a3e;
      --red:     #8b1a1a;
      --yellow:  #8b6a00;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); }
    body { font-family: 'Montserrat', sans-serif; }
    #root { min-height: 100vh; }

    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--gd25); border-radius: 2px; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
    .fade { animation: fadeUp .3s ease forwards; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Navigation ── */
    .tabbtn {
      background: transparent; border: 1px solid transparent;
      border-radius: 6px; padding: 7px 12px;
      color: var(--text2); cursor: pointer;
      font-family: 'Montserrat', sans-serif; font-size: 11px;
      font-weight: 500; letter-spacing: .08em; text-transform: uppercase;
      display: flex; align-items: center; gap: 5px;
      white-space: nowrap; transition: all .2s;
    }
    .tabbtn:hover { background: var(--gd15); color: var(--text); }
    .tabbtn.act   { background: var(--gd15); border-color: var(--gd40); color: var(--gold); }

    /* ── Cards ── */
    .card { transition: border-color .2s, transform .15s; }
    .card:hover { border-color: var(--gd40) !important; transform: translateY(-1px); }
    .vcard { cursor: pointer; }
    .vcard.open { border-color: var(--gd40) !important; border-radius: 8px 8px 0 0 !important; }

    /* ── Buttons ── */
    .btn-gold {
      background: var(--gold); color: #0D0D0D; border: none;
      border-radius: 6px; padding: 9px 18px;
      font-family: 'Montserrat', sans-serif; font-size: 11px;
      font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      cursor: pointer; transition: background .2s;
    }
    .btn-gold:hover { background: var(--gold2); }
    .btn-out {
      background: transparent; color: var(--text2);
      border: 1px solid var(--border2); border-radius: 6px;
      padding: 8px 14px; font-family: 'Montserrat', sans-serif;
      font-size: 11px; font-weight: 500; letter-spacing: .06em;
      cursor: pointer; transition: all .2s;
    }
    .btn-out:hover { border-color: var(--gd25); color: var(--text); }
    .btn-del {
      background: rgba(139,26,26,.15); color: rgba(220,80,80,.8);
      border: 1px solid rgba(139,26,26,.3); border-radius: 6px;
      padding: 6px 12px; font-family: 'Montserrat', sans-serif;
      font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
      cursor: pointer; transition: background .2s;
    }
    .btn-del:hover { background: rgba(139,26,26,.28); }

    /* ── Inputs ── */
    input, textarea, select {
      background: var(--surface); border: 1px solid rgba(232,168,32,.2);
      border-radius: 6px; padding: 9px 12px;
      color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 12px;
      outline: none; width: 100%; transition: border-color .2s;
    }
    input::placeholder, textarea::placeholder { color: var(--text3); }
    input:focus, textarea:focus, select:focus { border-color: var(--gd40); }
    textarea { resize: vertical; line-height: 1.6; }
    select option { background: #1a1a1a; }

    /* ── Socio dot ── */
    .sdot { cursor: pointer; transition: transform .15s; }
    .sdot:hover { transform: scale(1.08); }

    /* ── Install banner ── */
    #install-banner {
      display: none; position: fixed; bottom: 16px; left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a; border: 1px solid var(--gd40);
      border-radius: 10px; padding: 12px 16px;
      align-items: center; gap: 12px;
      font-family: 'Montserrat', sans-serif; font-size: 12px; color: var(--text);
      z-index: 1000; box-shadow: 0 8px 32px rgba(0,0,0,.7);
      max-width: 340px; width: calc(100% - 32px);
    }

    /* ── Label logo SVG ── */
    .orioles-logo { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="install-banner">
    <span>Instala Bodega Orioles</span>
    <button class="btn-gold" id="install-btn" style="padding:7px 12px;font-size:10px;flex-shrink:0">Instalar</button>
    <button class="btn-out"  id="install-close" style="padding:7px 10px;font-size:10px;flex-shrink:0">✕</button>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    // ── Logo SVG extraído de la etiqueta ────────────────────────────────────
    function OriolesLogo({ size = 56 }) {
      const g = "#E8A820";
      // Triángulos apuntando hacia abajo + rombos, disposición de árbol
      return (
        <svg width={size} height={size * 1.15} viewBox="0 0 60 70" fill="none" xmlns="http://www.w3.org/2000/svg">
          {/* Fila 1: rombo central top */}
          <rect x="27" y="0" width="6" height="6" transform="rotate(45 30 3)" fill={g}/>
          {/* Fila 2: triángulo grande central */}
          <polygon points="18,10 42,10 30,26" fill={g}/>
          {/* Fila 3: 2 rombos */}
          <rect x="10" y="27" width="5" height="5" transform="rotate(45 12.5 29.5)" fill={g}/>
          <rect x="43" y="27" width="5" height="5" transform="rotate(45 45.5 29.5)" fill={g}/>
          {/* Fila 4: 2 triángulos medios */}
          <polygon points="8,32 22,32 15,44" fill={g}/>
          <polygon points="38,32 52,32 45,44" fill={g}/>
          {/* Fila 5: 2 rombos */}
          <rect x="11" y="45" width="5" height="5" transform="rotate(45 13.5 47.5)" fill={g}/>
          <rect x="43" y="45" width="5" height="5" transform="rotate(45 45.5 47.5)" fill={g}/>
          {/* Fila 6: 2 triángulos pequeños */}
          <polygon points="8,50 22,50 15,62" fill={g}/>
          <polygon points="38,50 52,50 45,62" fill={g}/>
          {/* Fila 7: 2 rombos bottom */}
          <rect x="11" y="63" width="4" height="4" transform="rotate(45 13 65)" fill={g}/>
          <rect x="43" y="63" width="4" height="4" transform="rotate(45 45 65)" fill={g}/>
        </svg>
      );
    }

    // ── Datos ────────────────────────────────────────────────────────────────
    const SOCIOS_DEF = [
      { id:1, nombre:"Manuel", apodo:"(Padre)", rol:"Socio fundador" },
      { id:2, nombre:"Manuel", apodo:"(Hijo)",  rol:"Socio"          },
      { id:3, nombre:"Gabriel",  apodo:"", rol:"Socio"  },
      { id:4, nombre:"Antonio",  apodo:"", rol:"Socio"  },
      { id:5, nombre:"Héctor",   apodo:"", rol:"Socio"  },
      { id:6, nombre:"Cristina", apodo:"", rol:"Socia"  },
    ];

    const AÑO_FAENAS = 2026;

    const FAENAS_DEF = [
      { id:10,  nombre:"Poda",                     emoji:"✂️",  mes:"Enero",     dia:"", desc:"Poda de invierno. Eliminación de sarmientos del año anterior dejando las yemas necesarias para la próxima cosecha." },
      { id:20,  nombre:"Atado",                    emoji:"🪢",  mes:"Febrero",   dia:"", desc:"Atado de los sarmientos podados sobre los alambres de la espaldera para guiar el crecimiento del pámpano." },
      { id:30,  nombre:"Embotellado",              emoji:"🍾",  mes:"Marzo",     dia:"", desc:"Embotellado del vino elaborado en la vendimia anterior. Filtrado, llenado, corcho, capsulado y etiquetado." },
      { id:40,  nombre:"Limpieza de Bodega",       emoji:"🧹",  mes:"Marzo",     dia:"", desc:"Limpieza general de la bodega: toneles, depósitos, mangueras, prensas y todo el utillaje." },
      { id:50,  nombre:"Tratamiento Fitosanitario",emoji:"💧",  mes:"Mayo",      dia:"", desc:"Aplicación preventiva de azufre y cobre contra mildiu y oídio. Fundamental para proteger la cosecha." },
      { id:60,  nombre:"Desbrotado",               emoji:"🌿",  mes:"Mayo",      dia:"", desc:"Eliminación de brotes no productivos para concentrar la savia en los racimos principales." },
      { id:70,  nombre:"Deshojado",                emoji:"🍃",  mes:"Julio",     dia:"", desc:"Eliminación de hojas alrededor del racimo para favorecer la aireación y la maduración de la uva." },
      { id:80,  nombre:"Aclareo de racimos",        emoji:"🍇",  mes:"Agosto",    dia:"", desc:"Eliminación de racimos en exceso para concentrar azúcar y sabor en los que quedan." },
      { id:90,  nombre:"Vendimia",                 emoji:"🍇",  mes:"Octubre",   dia:"", desc:"Recogida manual de la uva. El momento más importante del año. Toda la familia en el campo." },
      { id:100, nombre:"Prensado",                 emoji:"🔩",  mes:"Octubre",   dia:"", desc:"Despalillado, estrujado y prensado de la uva para obtener el mosto. Llenado de depósitos." },
      { id:110, nombre:"Fermentación y Trasiegos", emoji:"🍷",  mes:"Noviembre", dia:"", desc:"Control de la fermentación alcohólica. Remontados diarios, control de temperatura y primer trasiego." },
    ];

    const VENDIMIAS_DEF = [
      { año:2019, fecha:"", kg:0, litros:0, variedades:[], alcohol:0, taninos:3, acidez:3, cuerpo:3, condiciones:"", notas:"" },
      { año:2020, fecha:"", kg:0, litros:0, variedades:[], alcohol:0, taninos:3, acidez:3, cuerpo:3, condiciones:"", notas:"" },
      { año:2021, fecha:"", kg:0, litros:0, variedades:[], alcohol:0, taninos:3, acidez:3, cuerpo:3, condiciones:"", notas:"" },
      { año:2022, fecha:"", kg:0, litros:0, variedades:[], alcohol:0, taninos:3, acidez:3, cuerpo:3, condiciones:"", notas:"" },
      { año:2023, fecha:"", kg:0, litros:0, variedades:[], alcohol:0, taninos:3, acidez:3, cuerpo:3, condiciones:"", notas:"" },
      { año:2024, fecha:"", kg:0, litros:0, variedades:[], alcohol:0, taninos:3, acidez:3, cuerpo:3, condiciones:"", notas:"" },
    ];

    const NEXT  = { "":"si", si:"no", no:"quizas", quizas:"" };
    const ICONO = { "":"❓", si:"✅", no:"❌", quizas:"🤔" };
    const LABEL = { "":"Sin confirmar", si:"Sí asisto", no:"No asisto", quizas:"Quizás" };
    const BORD  = { "":"rgba(255,255,255,.12)", si:"#2d7a3e", no:"#8b1a1a", quizas:"#8b6a00" };
    const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const ORDEN = Object.fromEntries(MESES.map((m,i)=>[m,i]));

    function load(k,d){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch{ return d; } }

    // ── Componentes ──────────────────────────────────────────────────────────
    function StatCard({ icon, value, sub }) {
      return (
        <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:8,padding:"16px 12px",textAlign:"center"}}>
          <p style={{fontSize:22,marginBottom:6}}>{icon}</p>
          <p style={{fontFamily:"'Crimson Pro',serif",fontSize:26,color:"var(--gold)",fontWeight:400,lineHeight:1}}>{value}</p>
          <p style={{fontSize:10,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".08em",marginTop:5,lineHeight:1.3}}>{sub}</p>
        </div>
      );
    }

    function RatingBtns({ value, onChange }) {
      return (
        <div style={{display:"flex",gap:4}}>
          {[1,2,3,4,5].map(n=>(
            <button key={n} onClick={()=>onChange(n)}
              style={{flex:1,height:22,borderRadius:3,border:"none",cursor:"pointer",
                background:n<=value?"var(--gold)":"rgba(232,168,32,.12)",transition:"background .15s"}}>
            </button>
          ))}
        </div>
      );
    }

    function SocioAvatar({ nombre, size=40 }) {
      return (
        <div style={{width:size,height:size,borderRadius:"50%",background:"#1a1a1a",border:"1.5px solid var(--gd25)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Montserrat",fontSize:size*0.38,fontWeight:700,color:"var(--gold)",flexShrink:0}}>
          {nombre.charAt(0).toUpperCase()}
        </div>
      );
    }

    // ── Estilos base ─────────────────────────────────────────────────────────
    const H2  = {fontFamily:"Montserrat",fontSize:20,fontWeight:700,letterSpacing:".12em",textTransform:"uppercase",color:"var(--text)",marginBottom:4};
    const H3  = {fontFamily:"Montserrat",fontSize:13,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--gold)"};
    const DSC = {fontSize:12,color:"var(--text2)",lineHeight:1.7,marginBottom:16};
    const CARD_S = {background:"var(--surface)",border:"1px solid var(--border)",borderRadius:8,padding:16};
    const DET_BOX = {background:"#111",border:"1px solid var(--border)",borderTop:"none",borderRadius:"0 0 8px 8px",padding:"16px 16px 20px"};
    const LBL = {fontSize:10,fontWeight:600,letterSpacing:".1em",textTransform:"uppercase",color:"var(--gold)",marginBottom:5,display:"block"};
    const VAL = {fontFamily:"'Crimson Pro',serif",fontSize:22,color:"var(--text)",lineHeight:1};
    const TAG_S = {fontSize:10,fontWeight:600,letterSpacing:".06em",textTransform:"uppercase",background:"rgba(232,168,32,.1)",border:"1px solid rgba(232,168,32,.22)",color:"var(--gold)",padding:"3px 9px",borderRadius:4,display:"inline-block"};
    const MES_S = {fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",background:"rgba(232,168,32,.12)",border:"1px solid var(--gd25)",color:"var(--gold)",padding:"3px 8px",borderRadius:4};

    // ── APP ──────────────────────────────────────────────────────────────────
    function App() {
      const [tab,        setTab]        = useState("inicio");
      const [socios,     setSocios]     = useState(()=>load("bo2_socios",     SOCIOS_DEF));
      const [vendimias,  setVendimias]  = useState(()=>load("bo2_vendimias",  VENDIMIAS_DEF));
      const [faenas,     setFaenas]     = useState(()=>load("bo2_faenas",     FAENAS_DEF));
      const [asistencia, setAsistencia] = useState(()=>load("bo2_asistencia", {}));
      const [openV,      setOpenV]      = useState(null);
      const [showAddV,   setShowAddV]   = useState(false);
      const [showAddS,   setShowAddS]   = useState(false);
      const [showAddF,   setShowAddF]   = useState(false);
      const [editFecha,  setEditFecha]  = useState(null);
      const [nuevaV, setNuevaV] = useState({año:"",fecha:"",kg:"",litros:"",variedades:"",alcohol:"",condiciones:"",notas:""});
      const [nuevoS, setNuevoS] = useState({nombre:"",apodo:"",rol:""});
      const [nuevaF, setNuevaF] = useState({nombre:"",emoji:"",mes:"Enero",desc:""});

      useEffect(()=>{localStorage.setItem("bo2_socios",     JSON.stringify(socios));},[socios]);
      useEffect(()=>{localStorage.setItem("bo2_vendimias",  JSON.stringify(vendimias));},[vendimias]);
      useEffect(()=>{localStorage.setItem("bo2_faenas",     JSON.stringify(faenas));},[faenas]);
      useEffect(()=>{localStorage.setItem("bo2_asistencia", JSON.stringify(asistencia));},[asistencia]);

      const getA    = (fId,sId) => asistencia[`${fId}_${sId}`]||"";
      const toggleA = (fId,sId) => { const k=`${fId}_${sId}`; setAsistencia(p=>({...p,[k]:NEXT[p[k]||""]})); };
      const setV    = (año,key,val) => setVendimias(p=>p.map(x=>x.año===año?{...x,[key]:val}:x));

      const fConDatos  = vendimias.filter(v=>v.kg>0);
      const totalLitros = fConDatos.reduce((s,v)=>s+v.litros,0);
      const totalKg     = fConDatos.reduce((s,v)=>s+v.kg,0);
      const maxLitros   = Math.max(...fConDatos.map(v=>v.litros),1);
      const mejorAño    = fConDatos.length ? [...fConDatos].sort((a,b)=>b.litros-a.litros)[0] : null;
      const faenasSorted = [...faenas].sort((a,b)=>ORDEN[a.mes]-ORDEN[b.mes]||a.id-b.id);

      const TABS = [
        {id:"inicio",    emoji:"◈", label:"Inicio"},
        {id:"vendimias", emoji:"◈", label:"Vendimias"},
        {id:"faenas",    emoji:"◈", label:"Faenas"},
        {id:"socios",    emoji:"◈", label:"Socios"},
        {id:"galeria",   emoji:"◈", label:"Galería"},
      ];

      // ─── INICIO ──────────────────────────────────────────────────────────
      const renderInicio = () => (
        <div className="fade">
          {/* Hero */}
          <div style={{textAlign:"center",padding:"32px 0 28px",borderBottom:"1px solid var(--border2)",marginBottom:28}}>
            <OriolesLogo size={64} />
            <h1 style={{fontFamily:"Montserrat",fontSize:28,fontWeight:700,letterSpacing:".22em",textTransform:"uppercase",color:"var(--gold)",marginTop:16,lineHeight:1}}>ORIOLES</h1>
            <p style={{fontFamily:"Montserrat",fontSize:10,fontWeight:500,letterSpacing:".2em",textTransform:"uppercase",color:"var(--text2)",marginTop:6}}>QUEBRACÁNTAROS · VALDEJALÓN</p>
            <p style={{fontFamily:"Montserrat",fontSize:10,fontWeight:400,letterSpacing:".12em",textTransform:"uppercase",color:"var(--text3)",marginTop:3}}>6 SOCIOS · DESDE 2019</p>
          </div>

          {/* Stats */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:10,marginBottom:28}}>
            <StatCard icon="⚖️" value={totalKg>0?`${totalKg.toLocaleString()} kg`:"—"} sub="Uva recogida" />
            <StatCard icon="🍶" value={totalLitros>0?`${totalLitros.toLocaleString()} L`:"—"} sub="Vino elaborado" />
            <StatCard icon="📆" value={vendimias.length} sub="Vendimias" />
            <StatCard icon="👥" value={socios.length} sub="Socios" />
          </div>

          {/* Gráfico */}
          {fConDatos.length > 0 && (
            <>
              <p style={{...H3,marginBottom:14}}>Producción por año</p>
              <div style={{...CARD_S,marginBottom:24}}>
                {[...fConDatos].sort((a,b)=>a.año-b.año).map(v=>(
                  <div key={v.año} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                    <span style={{fontFamily:"Montserrat",fontSize:11,fontWeight:600,color:"var(--gold)",width:36,flexShrink:0}}>{v.año}</span>
                    <div style={{flex:1,height:24,background:"rgba(255,255,255,.04)",borderRadius:4,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${(v.litros/maxLitros)*100}%`,background:"linear-gradient(90deg,rgba(232,168,32,.6),var(--gold))",borderRadius:4,display:"flex",alignItems:"center",paddingLeft:8}}>
                        <span style={{fontSize:10,fontWeight:600,color:"#0D0D0D"}}>{v.litros} L</span>
                      </div>
                    </div>
                    <span style={{fontSize:10,color:"var(--text3)",width:50,textAlign:"right",flexShrink:0}}>{v.kg} kg</span>
                  </div>
                ))}
              </div>
            </>
          )}

          {/* Socios */}
          <p style={{...H3,marginBottom:14}}>Los socios</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {socios.map(sc=>(
              <div key={sc.id} style={{display:"flex",alignItems:"center",gap:8,...CARD_S,padding:"10px 14px",flex:"1 1 auto",minWidth:140}}>
                <SocioAvatar nombre={sc.nombre} size={36}/>
                <div>
                  <p style={{fontFamily:"Montserrat",fontSize:13,fontWeight:600,color:"var(--text)"}}>{sc.nombre}{sc.apodo?" "+sc.apodo:""}</p>
                  <p style={{fontSize:10,color:"var(--gold)",textTransform:"uppercase",letterSpacing:".06em"}}>{sc.rol}</p>
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      // ─── VENDIMIAS ────────────────────────────────────────────────────────
      const renderVendimias = () => (
        <div className="fade">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={H2}>Vendimias</h2>
              <p style={DSC}>Historial desde 2019 · Toca un año para editar</p>
            </div>
            <button className="btn-gold" onClick={()=>setShowAddV(!showAddV)}>+ Nueva</button>
          </div>

          {showAddV && (
            <div style={{...DET_BOX,borderRadius:8,borderTop:"1px solid var(--border)",marginBottom:14,padding:16}}>
              <p style={{...H3,marginBottom:14}}>Nueva vendimia</p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:8}}>
                {[["Año","año"],["Fecha dd/mm/aaaa","fecha"],["Kg uva","kg"],["Litros vino","litros"],["Variedades","variedades"],["Alcohol %","alcohol"]].map(([ph,k])=>(
                  <input key={k} placeholder={ph} value={nuevaV[k]} onChange={e=>setNuevaV(p=>({...p,[k]:e.target.value}))} />
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
                <textarea rows={2} placeholder="Condiciones del año" value={nuevaV.condiciones} onChange={e=>setNuevaV(p=>({...p,condiciones:e.target.value}))} />
                <textarea rows={2} placeholder="Notas de cata" value={nuevaV.notas} onChange={e=>setNuevaV(p=>({...p,notas:e.target.value}))} />
              </div>
              <div style={{display:"flex",gap:8,marginTop:12}}>
                <button className="btn-gold" onClick={()=>{
                  if(!nuevaV.año)return;
                  const v={año:+nuevaV.año,fecha:nuevaV.fecha,kg:+nuevaV.kg,litros:+nuevaV.litros,variedades:nuevaV.variedades.split(",").map(x=>x.trim()).filter(Boolean),alcohol:+nuevaV.alcohol,taninos:3,acidez:3,cuerpo:3,condiciones:nuevaV.condiciones,notas:nuevaV.notas};
                  setVendimias(p=>[...p.filter(x=>x.año!==v.año),v].sort((a,b)=>a.año-b.año));
                  setNuevaV({año:"",fecha:"",kg:"",litros:"",variedades:"",alcohol:"",condiciones:"",notas:""});
                  setShowAddV(false);
                }}>Guardar</button>
                <button className="btn-out" onClick={()=>setShowAddV(false)}>Cancelar</button>
              </div>
            </div>
          )}

          <div>
            {[...vendimias].sort((a,b)=>b.año-a.año).map(v=>(
              <div key={v.año} style={{marginBottom:openV===v.año?0:8}}>
                <div className={`vcard card ${openV===v.año?"open":""}`}
                  style={{...CARD_S,padding:"14px 16px"}}
                  onClick={()=>setOpenV(openV===v.año?null:v.año)}
                >
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                        <span style={{fontFamily:"'Crimson Pro',serif",fontSize:34,color:"var(--gold)",lineHeight:1}}>{v.año}</span>
                        {mejorAño&&v.año===mejorAño.año&&v.kg>0 && (
                          <span style={{...TAG_S,fontSize:9}}>🏆 MEJOR AÑO</span>
                        )}
                        {v.kg===0 && <span style={{fontSize:10,color:"var(--text3)"}}>Sin datos</span>}
                      </div>
                      {v.fecha && <p style={{fontSize:11,color:"var(--text2)"}}>🍇 {v.fecha}</p>}
                      {v.variedades&&v.variedades.length>0 && (
                        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>
                          {v.variedades.map(vv=><span key={vv} style={TAG_S}>{vv}</span>)}
                        </div>
                      )}
                    </div>
                    <div style={{textAlign:"right"}}>
                      {v.litros>0 && <p style={{fontFamily:"'Crimson Pro',serif",fontSize:24,color:"var(--text)"}}>{v.litros} L</p>}
                      {v.kg>0    && <p style={{fontSize:11,color:"var(--text2)"}}>{v.kg} kg</p>}
                      <p style={{fontSize:10,color:"var(--gold)",marginTop:8,letterSpacing:".06em"}}>{openV===v.año?"▲ Ocultar":"▼ Editar"}</p>
                    </div>
                  </div>
                </div>

                {openV===v.año && (
                  <div style={DET_BOX}>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:8,marginBottom:10}}>
                      {[["Fecha","fecha"],["Kg uva","kg"],["Litros","litros"],["Alcohol %","alcohol"]].map(([ph,k])=>(
                        <div key={k}>
                          <span style={LBL}>{ph}</span>
                          <input value={v[k]||""} placeholder={ph}
                            onChange={e=>setV(v.año,k,["kg","litros","alcohol"].includes(k)?+e.target.value:e.target.value)} />
                        </div>
                      ))}
                    </div>
                    <div style={{marginBottom:10}}>
                      <span style={LBL}>Variedades (separadas por coma)</span>
                      <input value={(v.variedades||[]).join(", ")} placeholder="Garnacha, Tempranillo…"
                        onChange={e=>setV(v.año,"variedades",e.target.value.split(",").map(x=>x.trim()).filter(Boolean))} />
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                      <div>
                        <span style={LBL}>Condiciones del año</span>
                        <textarea rows={3} value={v.condiciones||""} placeholder="Clima, incidencias…"
                          onChange={e=>setV(v.año,"condiciones",e.target.value)} />
                      </div>
                      <div>
                        <span style={LBL}>Notas de cata</span>
                        <textarea rows={3} value={v.notas||""} placeholder="Aromas, sabores, estructura…"
                          onChange={e=>setV(v.año,"notas",e.target.value)} />
                      </div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
                      {[["Taninos","taninos"],["Acidez","acidez"],["Cuerpo","cuerpo"]].map(([lab,k])=>(
                        <div key={k}>
                          <span style={LBL}>{lab}</span>
                          <RatingBtns value={v[k]||3} onChange={n=>setV(v.año,k,n)} />
                          <p style={{fontSize:10,color:"var(--gold)",textAlign:"right",marginTop:3}}>{v[k]||3}/5</p>
                        </div>
                      ))}
                    </div>
                    <div style={{display:"flex",justifyContent:"flex-end"}}>
                      <button className="btn-del" onClick={e=>{e.stopPropagation();if(window.confirm(`¿Eliminar vendimia ${v.año}?`)){setVendimias(p=>p.filter(x=>x.año!==v.año));setOpenV(null);}}}>
                        Eliminar {v.año}
                      </button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );

      // ─── FAENAS ───────────────────────────────────────────────────────────
      const renderFaenas = () => {
        const mesActual = MESES[new Date().getMonth()];
        const porMes = MESES.reduce((acc,m)=>{
          const fs=faenasSorted.filter(f=>f.mes===m);
          if(fs.length) acc[m]=fs;
          return acc;
        },{});

        return (
          <div className="fade">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,flexWrap:"wrap",gap:10}}>
              <div>
                <h2 style={H2}>Faenas {AÑO_FAENAS}</h2>
                <p style={DSC}>Toca el nombre de cada socio para marcar asistencia · ❓→✅→❌→🤔</p>
              </div>
              <button className="btn-gold" onClick={()=>setShowAddF(!showAddF)}>+ Añadir</button>
            </div>

            {showAddF && (
              <div style={{...DET_BOX,borderRadius:8,borderTop:"1px solid var(--border)",marginBottom:14,padding:16}}>
                <p style={{...H3,marginBottom:14}}>Nueva faena</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"end"}}>
                  <input placeholder="Nombre de la faena" value={nuevaF.nombre} onChange={e=>setNuevaF(p=>({...p,nombre:e.target.value}))} />
                  <input placeholder="Emoji" value={nuevaF.emoji} style={{width:54,textAlign:"center"}} onChange={e=>setNuevaF(p=>({...p,emoji:e.target.value}))} />
                  <select value={nuevaF.mes} onChange={e=>setNuevaF(p=>({...p,mes:e.target.value}))}>
                    {MESES.map(m=><option key={m}>{m}</option>)}
                  </select>
                </div>
                <textarea rows={2} placeholder="Descripción" style={{marginTop:8}} value={nuevaF.desc} onChange={e=>setNuevaF(p=>({...p,desc:e.target.value}))} />
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button className="btn-gold" onClick={()=>{
                    if(!nuevaF.nombre)return;
                    setFaenas(p=>[...p,{id:Date.now(),...nuevaF,dia:""}]);
                    setNuevaF({nombre:"",emoji:"",mes:"Enero",desc:""});
                    setShowAddF(false);
                  }}>Guardar</button>
                  <button className="btn-out" onClick={()=>setShowAddF(false)}>Cancelar</button>
                </div>
              </div>
            )}

            {Object.entries(porMes).map(([mes,flist])=>(
              <div key={mes} style={{marginBottom:28}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,paddingBottom:8,borderBottom:"1px solid var(--border2)"}}>
                  <h3 style={{fontFamily:"Montserrat",fontSize:16,fontWeight:700,letterSpacing:".14em",textTransform:"uppercase",color:mes===mesActual?"var(--gold)":"var(--text2)"}}>{mes}</h3>
                  {mes===mesActual && <span style={MES_S}>Mes actual</span>}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {flist.map(f=>{
                    const conf = socios.filter(sc=>getA(f.id,sc.id)==="si").length;
                    return (
                      <div key={f.id} style={{...CARD_S}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:10}}>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
                              <span style={{fontSize:17}}>{f.emoji||"🔧"}</span>
                              <span style={{fontFamily:"Montserrat",fontSize:14,fontWeight:700,letterSpacing:".06em",color:"var(--text)"}}>{f.nombre}</span>
                            </div>
                            <p style={{fontSize:11,color:"var(--text2)",lineHeight:1.55,marginBottom:8}}>{f.desc}</p>
                            {/* Fecha editable */}
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              <span style={{fontSize:10,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"var(--gold)"}}>Fecha:</span>
                              {editFecha===f.id
                                ? <input autoFocus placeholder="dd/mm/aaaa" value={f.dia||""} style={{width:130,padding:"4px 8px",fontSize:11}}
                                    onChange={e=>setFaenas(p=>p.map(x=>x.id===f.id?{...x,dia:e.target.value}:x))}
                                    onBlur={()=>setEditFecha(null)} onKeyDown={e=>e.key==="Enter"&&setEditFecha(null)} />
                                : <span style={{fontSize:11,color:f.dia?"var(--text)":"var(--text3)",cursor:"pointer",borderBottom:"1px dashed rgba(232,168,32,.3)",paddingBottom:1}}
                                    onClick={()=>setEditFecha(f.id)}>{f.dia||"Pulsa para fijar fecha"}</span>
                              }
                            </div>
                          </div>
                          <div style={{textAlign:"center",background:"var(--gd15)",border:"1px solid var(--gd25)",borderRadius:6,padding:"8px 10px",flexShrink:0,minWidth:50}}>
                            <p style={{fontFamily:"'Crimson Pro',serif",fontSize:24,color:"var(--gold)",lineHeight:1}}>{conf}</p>
                            <p style={{fontSize:9,color:"var(--text3)",fontWeight:600,letterSpacing:".06em"}}>/{socios.length} SÍ</p>
                          </div>
                        </div>

                        {/* Asistencia */}
                        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                          {socios.map(sc=>{
                            const st=getA(f.id,sc.id);
                            const nombre=sc.apodo?`${sc.nombre} ${sc.apodo}`:sc.nombre;
                            return (
                              <button key={sc.id} className="sdot"
                                title={`${nombre}: ${LABEL[st]}`}
                                style={{background:"var(--bg2)",border:`1.5px solid ${BORD[st]}`,borderRadius:6,padding:"5px 10px",display:"flex",alignItems:"center",gap:5}}
                                onClick={()=>toggleA(f.id,sc.id)}
                              >
                                <span style={{fontFamily:"Montserrat",fontSize:11,fontWeight:500,color:"var(--text2)"}}>{sc.nombre}</span>
                                {sc.apodo&&<span style={{fontSize:9,color:"var(--text3)"}}>{sc.apodo}</span>}
                                <span style={{fontSize:12}}>{ICONO[st]}</span>
                              </button>
                            );
                          })}
                        </div>
                        <div style={{display:"flex",justifyContent:"flex-end"}}>
                          <button className="btn-del" onClick={()=>{if(window.confirm(`¿Eliminar "${f.nombre}"?`))setFaenas(p=>p.filter(x=>x.id!==f.id));}}>Eliminar faena</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        );
      };

      // ─── SOCIOS ───────────────────────────────────────────────────────────
      const renderSocios = () => (
        <div className="fade">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={H2}>Socios</h2>
              <p style={DSC}>{socios.length} personas · Bodega Orioles · Valdejalón</p>
            </div>
            <button className="btn-gold" onClick={()=>setShowAddS(!showAddS)}>+ Añadir</button>
          </div>

          {showAddS && (
            <div style={{...DET_BOX,borderRadius:8,borderTop:"1px solid var(--border)",marginBottom:14,padding:16}}>
              <p style={{...H3,marginBottom:14}}>Nuevo socio</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <input placeholder="Nombre" value={nuevoS.nombre} onChange={e=>setNuevoS(p=>({...p,nombre:e.target.value}))} />
                <input placeholder="(Padre), (Hijo)…" value={nuevoS.apodo} onChange={e=>setNuevoS(p=>({...p,apodo:e.target.value}))} />
                <input placeholder="Rol" value={nuevoS.rol} onChange={e=>setNuevoS(p=>({...p,rol:e.target.value}))} />
              </div>
              <div style={{display:"flex",gap:8,marginTop:10}}>
                <button className="btn-gold" onClick={()=>{
                  if(!nuevoS.nombre)return;
                  setSocios(p=>[...p,{id:Date.now(),...nuevoS}]);
                  setNuevoS({nombre:"",apodo:"",rol:""});
                  setShowAddS(false);
                }}>Guardar</button>
                <button className="btn-out" onClick={()=>setShowAddS(false)}>Cancelar</button>
              </div>
            </div>
          )}

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10}}>
            {socios.map(sc=>{
              const conf=faenas.filter(f=>getA(f.id,sc.id)==="si").length;
              const pct=faenas.length>0?Math.round((conf/faenas.length)*100):0;
              const faenasNombres=faenas.filter(f=>getA(f.id,sc.id)==="si").map(f=>f.nombre);
              return (
                <div key={sc.id} className="card" style={{...CARD_S,textAlign:"center",padding:"20px 14px"}}>
                  <div style={{width:52,height:52,borderRadius:"50%",background:"#111",border:"1.5px solid var(--gd40)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Montserrat",fontSize:22,fontWeight:700,color:"var(--gold)",margin:"0 auto 12px"}}>
                    {sc.nombre.charAt(0).toUpperCase()}
                  </div>
                  <p style={{fontFamily:"Montserrat",fontSize:15,fontWeight:700,color:"var(--text)",letterSpacing:".04em"}}>{sc.nombre}</p>
                  {sc.apodo && <p style={{fontSize:11,color:"var(--text2)",marginTop:1}}>{sc.apodo}</p>}
                  <p style={{fontSize:10,fontWeight:600,letterSpacing:".1em",textTransform:"uppercase",color:"var(--gold)",marginTop:4,marginBottom:14}}>{sc.rol}</p>
                  <div style={{display:"flex",justifyContent:"space-around",borderTop:"1px solid var(--border2)",paddingTop:12,marginBottom:12}}>
                    <div>
                      <p style={{fontFamily:"'Crimson Pro',serif",fontSize:24,color:"var(--gold)"}}>{conf}</p>
                      <p style={{fontSize:9,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"var(--text3)"}}>Faenas</p>
                    </div>
                    <div>
                      <p style={{fontFamily:"'Crimson Pro',serif",fontSize:24,color:"var(--gold)"}}>{pct}%</p>
                      <p style={{fontSize:9,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"var(--text3)"}}>Partic.</p>
                    </div>
                  </div>
                  {faenasNombres.length>0 && (
                    <div style={{display:"flex",flexWrap:"wrap",gap:3,justifyContent:"center",marginBottom:10}}>
                      {faenasNombres.slice(0,4).map(n=>(
                        <span key={n} style={{fontSize:9,background:"rgba(45,122,62,.15)",border:"1px solid rgba(45,122,62,.3)",color:"rgba(100,210,130,.9)",padding:"2px 5px",borderRadius:3,fontWeight:600,letterSpacing:".04em"}}>✅ {n}</span>
                      ))}
                      {faenasNombres.length>4 && <span style={{fontSize:9,color:"var(--text3)"}}>+{faenasNombres.length-4} más</span>}
                    </div>
                  )}
                  <button className="btn-del" style={{width:"100%"}} onClick={()=>{if(window.confirm(`¿Eliminar a ${sc.nombre}?`))setSocios(p=>p.filter(x=>x.id!==sc.id));}}>Eliminar</button>
                </div>
              );
            })}
          </div>
        </div>
      );

      // ─── GALERÍA ──────────────────────────────────────────────────────────
      const renderGaleria = () => (
        <div className="fade">
          <h2 style={H2}>Galería</h2>
          <p style={DSC}>Fotos y vídeos de cada vendimia y faena · Próximamente</p>
          <div style={{border:"1px dashed var(--gd25)",borderRadius:8,padding:"56px 24px",textAlign:"center"}}>
            <OriolesLogo size={52} />
            <h3 style={{fontFamily:"Montserrat",fontSize:16,fontWeight:700,letterSpacing:".16em",textTransform:"uppercase",color:"var(--gold)",margin:"18px 0 8px"}}>Álbumes de la Bodega</h3>
            <p style={{fontSize:12,color:"var(--text3)",maxWidth:300,lineHeight:1.8,margin:"0 auto 20px"}}>
              En la próxima versión conectada a la nube podrás subir fotos y vídeos de cada faena, organizados por año.
            </p>
            <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>
              {vendimias.map(v=>(
                <div key={v.año} style={{...TAG_S,padding:"5px 12px"}}>
                  {v.año} {mejorAño&&v.año===mejorAño.año&&v.kg>0?"🏆":""}
                </div>
              ))}
            </div>
          </div>
        </div>
      );

      // ─── RENDER ───────────────────────────────────────────────────────────
      return (
        <div style={{minHeight:"100vh",background:"var(--bg)"}}>
          {/* Header */}
          <header style={{background:"#0D0D0D",borderBottom:"1px solid rgba(232,168,32,.15)",padding:"12px 18px"}}>
            <div style={{display:"flex",alignItems:"center",gap:14,maxWidth:800,margin:"0 auto"}}>
              <OriolesLogo size={36} />
              <div>
                <h1 style={{fontFamily:"Montserrat",fontSize:18,fontWeight:700,letterSpacing:".22em",textTransform:"uppercase",color:"var(--gold)",lineHeight:1}}>ORIOLES</h1>
                <p style={{fontSize:9,fontWeight:500,letterSpacing:".18em",textTransform:"uppercase",color:"var(--text2)",marginTop:3}}>QUEBRACÁNTAROS · VALDEJALÓN</p>
              </div>
            </div>
          </header>

          {/* Nav */}
          <nav style={{display:"flex",overflowX:"auto",gap:2,padding:"6px 12px",borderBottom:"1px solid var(--border2)",background:"#111"}}>
            {TABS.map(t=>(
              <button key={t.id} className={`tabbtn ${tab===t.id?"act":""}`} onClick={()=>setTab(t.id)}>
                {t.label}
              </button>
            ))}
          </nav>

          {/* Main */}
          <main style={{padding:"24px 16px 64px",maxWidth:800,margin:"0 auto"}}>
            {tab==="inicio"    && renderInicio()}
            {tab==="vendimias" && renderVendimias()}
            {tab==="faenas"    && renderFaenas()}
            {tab==="socios"    && renderSocios()}
            {tab==="galeria"   && renderGaleria()}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(r => console.log('SW OK:', r.scope))
          .catch(e => console.warn('SW:', e));
      });
    }
    let deferredPrompt;
    const banner = document.getElementById('install-banner');
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); deferredPrompt = e; banner.style.display = 'flex';
    });
    document.getElementById('install-btn').addEventListener('click', () => {
      banner.style.display = 'none'; deferredPrompt.prompt();
    });
    document.getElementById('install-close').addEventListener('click', () => {
      banner.style.display = 'none';
    });
    window.addEventListener('appinstalled', () => { banner.style.display = 'none'; });
  </script>
</body>
</html>
