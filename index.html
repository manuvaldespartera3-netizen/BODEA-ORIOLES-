<!DOCTYPE html>

<style>
:root{--bg:#0D0D0D;--bg2:#111;--sur:#1A1A1A;--gold:#E8A820;--g10:rgba(232,168,32,.10);--g20:rgba(232,168,32,.20);--g35:rgba(232,168,32,.35);--g50:rgba(232,168,32,.50);--tx:#F0EAD6;--tx2:rgba(240,234,214,.55);--tx3:rgba(240,234,214,.28);--br:rgba(232,168,32,.18);--br2:rgba(255,255,255,.06);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:Montserrat,sans-serif}
#root{min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade{animation:fadeUp .25s ease forwards}
.tb{background:transparent;border:1px solid transparent;border-radius:5px;padding:7px 11px;color:var(--tx2);cursor:pointer;font-family:Montserrat,sans-serif;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;transition:all .2s}
.tb.a{background:var(--g10);border-color:var(--g35);color:var(--gold)}
.vtb{background:transparent;border:1px solid transparent;border-radius:4px;padding:5px 9px;color:var(--tx2);cursor:pointer;font-family:Montserrat,sans-serif;font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;transition:all .2s}
.vtb.a{background:var(--g10);border-color:var(--g35);color:var(--gold)}
.bg{background:var(--gold);color:#0D0D0D;border:none;border-radius:5px;padding:8px 16px;font-family:Montserrat,sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
.bo{background:transparent;color:var(--tx2);border:1px solid var(--br2);border-radius:5px;padding:7px 13px;font-family:Montserrat,sans-serif;font-size:10px;cursor:pointer}
.be{background:var(--g10);color:var(--gold);border:1px solid var(--g20);border-radius:5px;padding:5px 10px;font-family:Montserrat,sans-serif;font-size:10px;font-weight:600;cursor:pointer}
.bd{background:rgba(180,40,40,.12);color:rgba(220,80,80,.8);border:1px solid rgba(180,40,40,.25);border-radius:5px;padding:5px 10px;font-family:Montserrat,sans-serif;font-size:10px;cursor:pointer}
input,textarea,select{background:var(--sur);border:1px solid rgba(232,168,32,.2);border-radius:5px;padding:8px 11px;color:var(--tx);font-family:Montserrat,sans-serif;font-size:12px;outline:none;width:100%;transition:border-color .2s}
input[type=date]{color-scheme:dark}
input::placeholder,textarea::placeholder{color:var(--tx3)}
input:focus,textarea:focus{border-color:var(--g50)}
textarea{resize:vertical;line-height:1.6}
body.locked .bg,body.locked .bd,body.locked .be{display:none!important}
body.locked input:not(.lbtn),body.locked select,body.locked textarea{pointer-events:none;opacity:.5}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
(function() {
'use strict';
var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useContext = React.useContext;
var createContext = React.createContext;

// ─── Context ────────────────────────────────────────────────────────
var Ctx = createContext({});
function useApp() { return useContext(Ctx); }

// ─── Constantes ──────────────────────────────────────────────────────
var MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var MORD = {}; MESES.forEach(function(m,i){ MORD[m]=i; });
var VARIEDADES = ['Garnacha','Tempranillo','Macabeo','Garnacha Blanca'];
var ANOS = [2020,2021,2022,2023,2024,2025,2026];
var NEXT = {'':'si', si:'no', no:'quizas', quizas:''};
var AICON = {'':'❓', si:'✅', no:'❌', quizas:'🤔'};
var ALBL = {'':'Sin confirmar', si:'Sí asisto', no:'No asisto', quizas:'Quizás'};
var ABRD = {'':'rgba(255,255,255,.1)', si:'#2d7a3e', no:'#8b1a1a', quizas:'#8b6a00'};
var A_TABS = [
  {id:'general',l:'General'},{id:'vinas',l:'Viñas'},{id:'campo',l:'Campo'},
  {id:'fermentacion',l:'Fermentación'},{id:'sulfuroso',l:'Sulfuroso'},
  {id:'analisis',l:'Análisis'},{id:'hitos',l:'Hitos'},{id:'catas',l:'Catas'}
];
var CATS_ECO = [
  {id:'quimicos',label:'Químicos',emoji:'🧪'},{id:'limpieza',label:'Limpieza',emoji:'🧹'},
  {id:'uva',label:'Uva',emoji:'🍇'},{id:'botella',label:'Botella',emoji:'🍾'},
  {id:'corcho',label:'Corcho',emoji:'🪵'},{id:'etiqueta',label:'Etiqueta',emoji:'🏷️'},
  {id:'analisis_lab',label:'Análisis lab.',emoji:'🔬'},{id:'general',label:'General',emoji:'📦'}
];

// ─── Estilos ─────────────────────────────────────────────────────────
var S = {
  H2:{fontFamily:'Montserrat',fontSize:18,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:'var(--tx)',marginBottom:4},
  H3:{fontFamily:'Montserrat',fontSize:11,fontWeight:700,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--gold)',marginBottom:10},
  DSC:{fontSize:12,color:'var(--tx2)',lineHeight:1.7,marginBottom:16},
  C:{background:'var(--sur)',border:'1px solid var(--br)',borderRadius:7,padding:14},
  DB:{background:'#111',border:'1px solid var(--br)',borderTop:'none',borderRadius:'0 0 7px 7px',padding:14},
  LB:{fontSize:10,fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--gold)',marginBottom:4,display:'block'},
  TG:{fontSize:10,fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',background:'var(--g10)',border:'1px solid var(--g20)',color:'var(--gold)',padding:'3px 8px',borderRadius:4},
  MB:{fontSize:9,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',background:'var(--g10)',border:'1px solid var(--g20)',color:'var(--gold)',padding:'3px 7px',borderRadius:4},
};

// ─── Helpers ──────────────────────────────────────────────────────────
function load(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function uid(){return String(Date.now()+Math.random());}
function todayISO(){return new Date().toISOString().slice(0,10);}
function showDate(s){if(!s)return '';if(s.indexOf('-')>=0){var p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0];}return s;}
function parseDate(s){if(!s)return null;if(s.indexOf('-')>=0)return new Date(s+'T00:00:00');var p=s.split('/');if(p.length!==3)return null;var d=+p[0],m=+p[1],y=+p[2];if(!d||!m||!y)return null;return new Date(y,m-1,d);}
function diasR(s){var d=parseDate(s);if(!d)return null;var h2=new Date();h2.setHours(0,0,0,0);return Math.round((d-h2)/864e5);}
function calcEdad(fn){if(!fn)return null;var d=parseDate(fn);if(!d)return null;var h2=new Date();var e=h2.getFullYear()-d.getFullYear();if(h2.getMonth()-d.getMonth()<0||(h2.getMonth()-d.getMonth()===0&&h2.getDate()<d.getDate()))e--;return e;}
function makeVino(nombre){return{id:uid(),nombre:nombre||'Vino sin nombre',fechaVendimia:'',litros:0,variedades:[],notas:''};}
function makeVend(ano){return{ano:ano,vinos:[],vinas:[],campo:[],fermentaciones:[],sulfuroso:[],analisis:[],hitos:[],catas:[]};}
function vendLitros(v){return (v.vinos||[]).reduce(function(s,vn){return s+(+vn.litros||0);},0);}
function vendKg(v){return (v.vinas||[]).reduce(function(s,e){return s+(e.variedades||[]).reduce(function(t,va){return t+(+va.kg||0);},0);},0);}
function migrateVends(saved){
  if(!saved)return ANOS.map(makeVend);
  var byAno={};
  saved.forEach(function(v){byAno[v.ano||v['\u00e1\u00f1o']||v.year]=v;});
  return ANOS.map(function(ano){
    var old=byAno[ano];
    if(!old)return makeVend(ano);
    return {
      ano:ano,
      vinos:(old.vinos||[]).map(function(vn){return {id:vn.id||uid(),nombre:vn.nombre||'Vino '+ano,fechaVendimia:vn.fechaVendimia||'',litros:vn.litros||0,variedades:vn.variedades||[],notas:vn.notas||''};} ),
      vinas:old.vinas||old['\u00f1as']||old['vi\u00f1as']||[],
      campo:old.campo||[],
      fermentaciones:old.fermentaciones||[],
      sulfuroso:old.sulfuroso||[],
      analisis:old.analisis||[],
      hitos:old.hitos||[],
      catas:old.catas||[]
    };
  });
}

// ─── Datos iniciales ──────────────────────────────────────────────────
var SOCIOS0 = [
  {id:1,nombre:'Manuel',apodo:'(Padre)',rol:'Socio'},
  {id:2,nombre:'Manuel',apodo:'(Hijo)',rol:'Socio'},
  {id:3,nombre:'Gabriel',apodo:'',rol:'Socio'},
  {id:4,nombre:'Antonio',apodo:'',rol:'Socio'},
  {id:5,nombre:'Héctor',apodo:'',rol:'Socio'},
  {id:6,nombre:'Cristina',apodo:'',rol:'Socia'}
].map(function(s){return Object.assign({nombreCompleto:'',fechaNacimiento:'',pseudonimo:'',valorAporta:'',foto:''},s);});

var FAENAS0 = [
  {id:10,ano:2026,nombre:'Poda',emoji:'✂️',mes:'Enero',dia:'',desc:'Poda de invierno.'},
  {id:20,ano:2026,nombre:'Atado',emoji:'🪢',mes:'Febrero',dia:'',desc:'Atado de sarmientos.'},
  {id:30,ano:2026,nombre:'Embotellado',emoji:'🍾',mes:'Marzo',dia:'',desc:'Filtrado, llenado y etiquetado.'},
  {id:40,ano:2026,nombre:'Limpieza',emoji:'🧹',mes:'Marzo',dia:'',desc:'Limpieza de bodega.'},
  {id:50,ano:2026,nombre:'Tratamiento',emoji:'💧',mes:'Mayo',dia:'',desc:'Tratamiento fitosanitario.'},
  {id:60,ano:2026,nombre:'Desbrotado',emoji:'🌿',mes:'Mayo',dia:'',desc:'Eliminación de brotes.'},
  {id:70,ano:2026,nombre:'Deshojado',emoji:'🍃',mes:'Julio',dia:'',desc:'Hojas alrededor del racimo.'},
  {id:80,ano:2026,nombre:'Aclareo',emoji:'🍇',mes:'Agosto',dia:'',desc:'Eliminación de racimos.'},
  {id:90,ano:2026,nombre:'Vendimia',emoji:'🍇',mes:'Octubre',dia:'',desc:'Recogida de la uva.'},
  {id:100,ano:2026,nombre:'Prensado',emoji:'🔩',mes:'Octubre',dia:'',desc:'Despalillado y depósitos.'},
  {id:110,ano:2026,nombre:'Fermentación',emoji:'🍷',mes:'Noviembre',dia:'',desc:'Control y primer trasiego.'}
];

var INVC0 = [
  {id:'embotellado',nombre:'Embotellado',emoji:'🍾',items:[]},
  {id:'fermentacion',nombre:'Fermentación',emoji:'🫧',items:[]},
  {id:'limpieza',nombre:'Limpieza',emoji:'🧹',items:[]},
  {id:'general',nombre:'General',emoji:'🏚️',items:[]}
];

// ─── Logo SVG ─────────────────────────────────────────────────────────
function OriLogo(props) {
  var size = props.size||48;
  var g = '#E8A820';
  return h('svg',{width:size,height:Math.round(size*1.83),viewBox:'0 0 60 110',fill:'none'},
    h('polygon',{points:'30,0 34,4 30,8 26,4',fill:g}),
    h('polygon',{points:'13,10 47,10 30,28',fill:g}),
    h('polygon',{points:'8,31 12,35 8,39 4,35',fill:g}),
    h('polygon',{points:'52,31 56,35 52,39 48,35',fill:g}),
    h('polygon',{points:'3,41 23,41 13,56',fill:g}),
    h('polygon',{points:'37,41 57,41 47,56',fill:g}),
    h('polygon',{points:'8,58 12,62 8,66 4,62',fill:g}),
    h('polygon',{points:'52,58 56,62 52,66 48,62',fill:g}),
    h('polygon',{points:'3,68 23,68 13,82',fill:g}),
    h('polygon',{points:'37,68 57,68 47,82',fill:g}),
    h('polygon',{points:'4,94 22,94 13,106',fill:g}),
    h('polygon',{points:'38,94 56,94 47,106',fill:g})
  );
}

// ─── UI Atoms ─────────────────────────────────────────────────────────
function Av(props) {
  var nombre=props.nombre, foto=props.foto, size=props.size||44;
  if(foto) return h('img',{src:foto,style:{width:size,height:size,borderRadius:'50%',objectFit:'cover',flexShrink:0,border:'1.5px solid var(--g35)'}});
  return h('div',{style:{width:size,height:size,borderRadius:'50%',background:'#111',border:'1.5px solid var(--g35)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Montserrat',fontSize:Math.round(size*.4),fontWeight:700,color:'var(--gold)',flexShrink:0}},
    (nombre||'?').charAt(0).toUpperCase()
  );
}

function SocioBotones(props) {
  var fid = props.fid;
  var ctx = useApp();
  return h('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
    ctx.socios.map(function(sc) {
      var st = ctx.asist[fid+'_'+sc.id]||'';
      return h('button',{
        key:sc.id, className:'sdot',
        style:{background:'var(--bg2)',border:'1.5px solid '+ABRD[st],borderRadius:5,padding:'5px 9px',display:'flex',alignItems:'center',gap:5,cursor:'pointer'},
        onClick:function(){ctx.ta(fid,sc.id);}
      },
        h('span',{style:{fontFamily:'Montserrat',fontSize:11,fontWeight:500,color:'var(--tx2)'}},sc.nombre),
        sc.apodo?h('span',{style:{fontSize:9,color:'var(--tx3)'}},sc.apodo):null,
        h('span',{style:{fontSize:13}},AICON[st])
      );
    })
  );
}

// ─── Input helpers (stable components) ────────────────────────────────
function SI(props) {
  var val = props.value!=null?String(props.value):'';
  var state = useState(val);
  var v = state[0], setV = state[1];
  useEffect(function(){setV(props.value!=null?String(props.value):'');},[props.value]);
  return h('input',Object.assign({},props.style?{style:props.style}:{},{
    type:props.type||'text', value:v, placeholder:props.placeholder||'',
    onChange:function(e){setV(e.target.value);},
    onBlur:function(e){props.save(e.target.value);}
  }));
}
function SN(props) {
  var state = useState(props.value||'');
  var v = state[0], setV = state[1];
  useEffect(function(){setV(props.value||'');},[props.value]);
  return h('input',{type:'number',value:v,placeholder:props.placeholder||'0',
    style:props.style,
    onChange:function(e){setV(e.target.value);},
    onBlur:function(e){props.save(+e.target.value);}
  });
}
function ST(props) {
  var state = useState(props.value||'');
  var v = state[0], setV = state[1];
  useEffect(function(){setV(props.value||'');},[props.value]);
  return h('textarea',{rows:props.rows||3,value:v,placeholder:props.placeholder||'',
    onChange:function(e){setV(e.target.value);},
    onBlur:function(e){props.save(e.target.value);}
  });
}
function SD(props) {
  function toISO(s){if(!s)return '';if(s.indexOf('-')>=0)return s;var p=s.split('/');if(p.length!==3)return '';return p[2].padStart(4,'0')+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');}
  var state = useState(toISO(props.value)||'');
  var v = state[0], setV = state[1];
  useEffect(function(){setV(toISO(props.value)||'');},[props.value]);
  return h('input',{type:'date',value:v,
    onChange:function(e){setV(e.target.value);props.save(e.target.value);}
  });
}

// ─── VinosPicker / VinoSingle ─────────────────────────────────────────
function VinosPicker(props) {
  var vinos=props.vinos||[], selected=props.selected||[], onChange=props.onChange, label=props.label||'Asignar a vinos';
  if(!vinos.length) return h('p',{style:{fontSize:11,color:'var(--tx3)',padding:'6px 0'}},'Crea vinos en General.');
  return h('div',null,
    h('span',{style:S.LB},label),
    h('div',{style:{display:'flex',flexWrap:'wrap',gap:6,marginTop:4}},
      vinos.map(function(vn){
        var sel=selected.indexOf(vn.id)>=0;
        return h('button',{key:vn.id,
          style:{background:sel?'var(--g20)':'transparent',border:'1px solid '+(sel?'var(--g50)':'var(--br2)'),borderRadius:5,padding:'5px 10px',cursor:'pointer',fontFamily:'Montserrat',fontSize:11,fontWeight:600,color:sel?'var(--gold)':'var(--tx2)'},
          onClick:function(){onChange(sel?selected.filter(function(x){return x!==vn.id;}):[].concat(selected,[vn.id]));}
        },vn.nombre);
      })
    )
  );
}
function VinoSingle(props) {
  var vinos=props.vinos||[], selected=props.selected, onChange=props.onChange;
  if(!vinos.length) return h('p',{style:{fontSize:11,color:'var(--tx3)'}},'Crea vinos en General.');
  return h('div',{style:{display:'flex',flexWrap:'wrap',gap:6,marginTop:4}},
    vinos.map(function(vn){
      var sel=selected===vn.id;
      return h('button',{key:vn.id,
        style:{background:sel?'var(--g20)':'transparent',border:'1px solid '+(sel?'var(--g50)':'var(--br2)'),borderRadius:5,padding:'5px 10px',cursor:'pointer',fontFamily:'Montserrat',fontSize:11,fontWeight:600,color:sel?'var(--gold)':'var(--tx2)'},
        onClick:function(){onChange(sel?'':vn.id);}
      },vn.nombre);
    })
  );
}

// ─── EntradaLog ───────────────────────────────────────────────────────
function EntradaLog(props) {
  return h('div',{style:{background:'var(--bg2)',border:'1px solid var(--br2)',borderRadius:5,padding:'9px 11px',display:'flex',alignItems:'flex-start',gap:8,marginBottom:6}},
    h('div',{style:{flex:1}},
      props.vinoBadges&&props.vinoBadges.length?h('div',{style:{display:'flex',flexWrap:'wrap',gap:4,marginBottom:4}},
        props.vinoBadges.map(function(n){return h('span',{key:n,style:Object.assign({},S.MB,{fontSize:8})},'🍷 '+n);})):null,
      props.fecha?h('p',{style:{fontSize:10,color:'var(--gold)',fontWeight:600,marginBottom:2}},'📅 '+showDate(props.fecha)):null,
      h('p',{style:{fontSize:12,color:'var(--tx)',fontWeight:500}},props.titulo),
      props.extra?h('p',{style:{fontSize:11,color:'var(--tx2)',marginTop:2}},props.extra):null
    ),
    props.driveLink?h('button',{style:{background:'transparent',border:'none',cursor:'pointer',fontSize:20,flexShrink:0},onClick:function(){window.open(props.driveLink,'_blank');}},'📄'):null,
    props.onEdit?h('button',{className:'be',style:{padding:'3px 8px',fontSize:10,flexShrink:0},onClick:props.onEdit},'✏️'):null,
    h('button',{className:'bd',style:{padding:'3px 8px',fontSize:10,flexShrink:0},onClick:props.onDel},'✕')
  );
}


// ─── Forms ────────────────────────────────────────────────────────────
function FormCampo(props) {
  var state = useState(props.ini||{fecha:todayISO(),alcoholProbable:'',ph:'',comentario:'',vinoIds:[]});
  var f=state[0], setF=state[1];
  function s(k){return function(e){setF(function(p){var r=Object.assign({},p);r[k]=e.target.value;return r;});};}
  return h('div',{style:{background:'var(--bg2)',border:'1px solid var(--g20)',borderRadius:6,padding:12,marginTop:8}},
    h(VinosPicker,{vinos:props.vinos,selected:f.vinoIds,onChange:function(v){setF(function(p){return Object.assign({},p,{vinoIds:v});});}}),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,margin:'10px 0 8px'}},
      h('div',null,h('span',{style:S.LB},'Fecha'),h('input',{type:'date',value:f.fecha,onChange:s('fecha')})),
      h('div',null,h('span',{style:S.LB},'Alcohol prob %'),h('input',{value:f.alcoholProbable,onChange:s('alcoholProbable'),placeholder:'—'})),
      h('div',null,h('span',{style:S.LB},'PH'),h('input',{value:f.ph,onChange:s('ph'),placeholder:'—'}))
    ),
    h('div',{style:{marginBottom:8}},h('span',{style:S.LB},'Comentario'),h('textarea',{rows:2,value:f.comentario,onChange:s('comentario'),placeholder:'Observaciones…'})),
    h('div',{style:{display:'flex',gap:8}},
      h('button',{className:'bg',onClick:function(){props.onSave(Object.assign({},f,{id:f.id||uid()}));}},  'Guardar'),
      h('button',{className:'bo',onClick:props.onCancel},'Cancelar')
    )
  );
}

function FormFerm(props) {
  var state = useState(props.ini||{fechaEncubado:todayISO(),horaEncubado:'',densidadEncubado:'',phEncubado:'',descripcion:'',vinoIds:[]});
  var f=state[0], setF=state[1];
  function s(k){return function(e){setF(function(p){var r=Object.assign({},p);r[k]=e.target.value;return r;});};}
  return h('div',{style:{background:'var(--bg2)',border:'1px solid var(--g20)',borderRadius:6,padding:12,marginTop:8}},
    h(VinosPicker,{vinos:props.vinos,selected:f.vinoIds,onChange:function(v){setF(function(p){return Object.assign({},p,{vinoIds:v});});}}),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,margin:'10px 0 8px'}},
