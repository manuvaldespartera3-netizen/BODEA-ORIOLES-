<head>
  <meta charset="UTF-8"/>

  <link rel="manifest" href="./manifest.json"/>

  <meta name="apple-mobile-web-app-capable" content="yes"/>

  <style>
    :root{
      --bg:#0D0D0D;--bg2:#111;--sur:#1A1A1A;
      --gold:#E8A820;--gold2:#F0B429;
      --g10:rgba(232,168,32,.10);--g20:rgba(232,168,32,.20);
      --g35:rgba(232,168,32,.35);--g50:rgba(232,168,32,.50);
      --tx:#F0EAD6;--tx2:rgba(240,234,214,.55);--tx3:rgba(240,234,214,.28);
      --br:rgba(232,168,32,.18);--br2:rgba(255,255,255,.06);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Montserrat',sans-serif}
    #root{min-height:100vh}
    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-thumb{background:var(--g20);border-radius:2px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

    @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
    .blink{animation:blink 2s infinite}
    .tb{background:transparent;border:1px solid transparent;border-radius:5px;padding:7px 11px;color:var(--tx2);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;transition:all .2s}
    .tb:hover,.tb.a{background:var(--g10)}.tb.a{border-color:var(--g35);color:var(--gold)}
    .vtb{background:transparent;border:1px solid transparent;border-radius:4px;padding:5px 9px;color:var(--tx2);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;transition:all .2s}
    .vtb:hover,.vtb.a{background:var(--g10)}.vtb.a{border-color:var(--g35);color:var(--gold)}
    .bg{background:var(--gold);color:#0D0D0D;border:none;border-radius:5px;padding:8px 16px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .2s;flex-shrink:0}
    .bg:hover{background:var(--gold2)}
    .bo{background:transparent;color:var(--tx2);border:1px solid var(--br2);border-radius:5px;padding:7px 13px;font-family:'Montserrat',sans-serif;font-size:10px;cursor:pointer;transition:all .2s}
    .bo:hover{border-color:var(--g20);color:var(--tx)}
    .be{background:var(--g10);color:var(--gold);border:1px solid var(--g20);border-radius:5px;padding:5px 10px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;cursor:pointer}
    .bd{background:rgba(180,40,40,.12);color:rgba(220,80,80,.8);border:1px solid rgba(180,40,40,.25);border-radius:5px;padding:5px 10px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;cursor:pointer}
    .card{transition:border-color .2s,transform .15s}
    .card:hover{border-color:var(--g35)!important;transform:translateY(-1px)}
    .vc{cursor:pointer}.vc.op{border-color:var(--g50)!important;border-radius:7px 7px 0 0!important}
    .sdot{cursor:pointer;transition:transform .15s}.sdot:hover{transform:scale(1.07)}
    input,textarea,select{background:var(--sur);border:1px solid rgba(232,168,32,.2);border-radius:5px;padding:8px 11px;color:var(--tx);font-family:'Montserrat',sans-serif;font-size:12px;outline:none;width:100%;transition:border-color .2s}
    input[type=date]{color-scheme:dark}
    input::placeholder,textarea::placeholder{color:var(--tx3)}
    input:focus,textarea:focus,select:focus{border-color:var(--g50)}
    textarea{resize:vertical;line-height:1.6}
    select option{background:#1a1a1a}
    .editable{border-bottom:1px dashed rgba(232,168,32,.3);cursor:pointer}
    #ib{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--g35);border-radius:9px;padding:12px 16px;align-items:center;gap:10px;font-size:11px;color:var(--tx);z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.7);max-width:340px;width:calc(100% - 32px)}
  </style>
</head>

<div id="ib">

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback} = React;

/* ── Logo 7 pájaros ─────────────────────────────────────────────── */

      <polygon points="3,68 23,68 13,82" fill={g}/><polygon points="37,68 57,68 47,82" fill={g}/>
      <polygon points="8,84 12,88 8,92 4,88" fill={g}/><polygon points="52,84 56,88 52,92 48,88" fill={g}/>
      <polygon points="4,94 22,94 13,106" fill={g}/><polygon points="38,94 56,94 47,106" fill={g}/>

/* ── Constantes ─────────────────────────────────────────────────── */
const MESES      = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const MORD       = Object.fromEntries(MESES.map((m,i)=>[m,i]));
const VARIEDADES = ["Garnacha","Tempranillo","Macabeo","Garnacha Blanca"];
const VIÑAS_N    = ["Grío","Quebracántaros"];
const AÑOS_V     = [2020,2021,2022,2023,2024,2025,2026];
const V_TABS     = [{id:"general",l:"General"},{id:"vinas",l:"Viñas"},{id:"campo",l:"Campo"},{id:"sulfuroso",l:"Sulfuroso"},{id:"analisis",l:"Análisis"},{id:"hitos",l:"Hitos"}];
const NEXT       = {"":"si",si:"no",no:"quizas",quizas:""};
const AICON      = {"":"❓",si:"✅",no:"❌",quizas:"🤔"};
const ALBL       = {"":"Sin confirmar",si:"Sí asisto",no:"No asisto",quizas:"Quizás"};
const ABRD       = {"":"rgba(255,255,255,.1)",si:"#2d7a3e",no:"#8b1a1a",quizas:"#8b6a00"};
const CATS_ECO   = [
  {id:"quimicos",label:"Químicos",emoji:"🧪"},{id:"limpieza",label:"Limpieza",emoji:"🧹"},
  {id:"uva",label:"Uva",emoji:"🍇"},{id:"botella",label:"Botella",emoji:"🍾"},
  {id:"corcho",label:"Corcho",emoji:"🪵"},{id:"etiqueta",label:"Etiqueta",emoji:"🏷️"},
  {id:"analisis_lab",label:"Análisis lab.",emoji:"🔬"},{id:"general",label:"General",emoji:"📦"},
];

/* ── Estilos módulo-nivel ────────────────────────────────────────── */
const S={
  H2:{fontFamily:"Montserrat",fontSize:18,fontWeight:700,letterSpacing:".14em",textTransform:"uppercase",color:"var(--tx)",marginBottom:4},
  H3:{fontFamily:"Montserrat",fontSize:11,fontWeight:700,letterSpacing:".12em",textTransform:"uppercase",color:"var(--gold)",marginBottom:10},
  DSC:{fontSize:12,color:"var(--tx2)",lineHeight:1.7,marginBottom:16},
  C:{background:"var(--sur)",border:"1px solid var(--br)",borderRadius:7,padding:14},
  DB:{background:"#111",border:"1px solid var(--br)",borderTop:"none",borderRadius:"0 0 7px 7px",padding:14},
  LB:{fontSize:10,fontWeight:600,letterSpacing:".1em",textTransform:"uppercase",color:"var(--gold)",marginBottom:4,display:"block"},
  TG:{fontSize:10,fontWeight:600,letterSpacing:".06em",textTransform:"uppercase",background:"var(--g10)",border:"1px solid var(--g20)",color:"var(--gold)",padding:"3px 8px",borderRadius:4},
  MB:{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",background:"var(--g10)",border:"1px solid var(--g20)",color:"var(--gold)",padding:"3px 7px",borderRadius:4},
};

/* ── Helpers ─────────────────────────────────────────────────────── */
function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function todayISO(){return new Date().toISOString().slice(0,10);}
function showDate(s){
  if(!s)return"";
  if(s.includes("-")){const[y,m,d]=s.split("-");return`${d}/${m}/${y}`;}
  return s;
}
function parseDate(s){
  if(!s)return null;
  if(s.includes("-"))return new Date(s+"T00:00:00");
  const p=s.split("/");if(p.length!==3)return null;
  const[d,m,y]=p.map(Number);if(!d||!m||!y)return null;
  return new Date(y,m-1,d);
}
function diasR(s){
  const d=parseDate(s);if(!d)return null;
  const h=new Date();h.setHours(0,0,0,0);
  return Math.round((d-h)/864e5);
}
function calcEdad(fechaNac){
  if(!fechaNac)return null;
  const d=parseDate(fechaNac);if(!d)return null;
  const hoy=new Date();
  let edad=hoy.getFullYear()-d.getFullYear();
  const m=hoy.getMonth()-d.getMonth();
  if(m<0||(m===0&&hoy.getDate()<d.getDate()))edad--;
  return edad;
}

function makeVino(nombre){
  return{
    id:String(Date.now()+Math.random()),
    nombre:nombre||"Vino sin nombre",
    viñas:VIÑAS_N.map(n=>({nombre:n,variedades:[{variedad:"Garnacha",kg:0}]})),
    litros:0,densidad:"",ph:"",variedades:[],
    medicionesCampo:[],sulfuroso:[],analisis:[],hitos:[],notas:"",notaCata:""
  };
}
function makeVendimia(año){return{año,vinos:[makeVino("Vino "+año)]};}

function viñaKg(vn){return(vn.variedades||[]).reduce((s,va)=>s+(+va.kg||0),0);}
function vinoKg(vino){return(vino.viñas||[]).reduce((s,vn)=>s+viñaKg(vn),0);}
function vendKg(v){return(v.vinos||[]).reduce((s,vino)=>s+vinoKg(vino),0);}
function vendLitros(v){return(v.vinos||[]).reduce((s,vino)=>s+(+vino.litros||0),0);}

function migrateVends(saved){
  if(!saved)return AÑOS_V.map(makeVendimia);
  const byAño=Object.fromEntries(saved.map(v=>[v.año,v]));
  return AÑOS_V.map(año=>{
    const old=byAño[año];
    if(!old)return makeVendimia(año);
    if(old.vinos)return old; // already new structure
    // Migrate from old single-wine structure
    const vino=makeVino("Vino "+año);
    const migrViñas=(old.viñas||VIÑAS_N.map(n=>({nombre:n,variedades:[{variedad:"Garnacha",kg:0}]}))).map(vn=>{
      if(Array.isArray(vn.variedades))return vn;
      return{nombre:vn.nombre,variedades:[{variedad:vn.variedad||"Garnacha",kg:vn.kg||0}]};
    });
    const migrAn=old.analisis?(Array.isArray(old.analisis)?old.analisis:[]):[];
    Object.assign(vino,{viñas:migrViñas,litros:old.litros||0,densidad:old.densidad||"",ph:old.ph||"",variedades:old.variedades||[],medicionesCampo:old.medicionesCampo||[],sulfuroso:old.sulfuroso||[],analisis:migrAn,hitos:old.hitos||[],notas:old.notas||"",notaCata:old.notaCata||""});
    return{año,vinos:[vino]};
  });
}

/* ══════════════════════════════════════════════════════════════════
   COMPONENTES ESTABLES — guardan en onBlur, no en onChange
   → el teclado nunca desaparece mientras se escribe
══════════════════════════════════════════════════════════════════ */
// Input de texto estable
function SI({value,save,type="text",placeholder="",style={},min,max,step,autoFocus}){
  const[v,setV]=useState(value!=null?String(value):"");
  useEffect(()=>setV(value!=null?String(value):""),[value]);
  return<input type={type} value={v} placeholder={placeholder} style={style}
    min={min} max={max} step={step} autoFocus={autoFocus}
    onChange={e=>setV(e.target.value)}
    onBlur={e=>save(e.target.value)}/>;
}
// Input numérico estable
function SN({value,save,placeholder="0",style={}}){
  const[v,setV]=useState(value||"");
  useEffect(()=>setV(value||""),[value]);
  return<input type="number" value={v} placeholder={placeholder} style={style}
    onChange={e=>setV(e.target.value)}
    onBlur={e=>save(+e.target.value)}/>;
}
// Textarea estable
function ST({value,save,rows=3,placeholder=""}){
  const[v,setV]=useState(value||"");
  useEffect(()=>setV(value||""),[value]);
  return<textarea rows={rows} value={v} placeholder={placeholder}
    onChange={e=>setV(e.target.value)}
    onBlur={e=>save(e.target.value)}/>;
}
// Selector de fecha con calendario nativo
function SD({value,save,placeholder=""}){
  // Acepta dd/mm/aaaa o YYYY-MM-DD, guarda en YYYY-MM-DD
  function toISO(s){
    if(!s)return"";
    if(s.includes("-"))return s;
    const[d,m,y]=s.split("/");
    if(!d||!m||!y)return"";
    return`${y.padStart(4,"0")}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;
  }
  const[v,setV]=useState(toISO(value)||"");
  useEffect(()=>setV(toISO(value)||""),[value]);
  return<input type="date" value={v}
    onChange={e=>{setV(e.target.value);save(e.target.value);}}/>;
}

/* ── Otros UI components ─────────────────────────────────────────── */
function Stars({value,onChange}){
  return<div style={{display:"flex",gap:4,marginTop:4}}>{[1,2,3,4,5].map(n=><button key={n} onClick={()=>onChange(n)} style={{flex:1,height:20,borderRadius:3,border:"none",cursor:"pointer",background:n<=value?"var(--gold)":"rgba(232,168,32,.1)"}}/>)}</div>;
}
function Av({nombre,foto,size=44}){
  if(foto)return<img src={foto} style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",flexShrink:0,border:"1.5px solid var(--g35)"}}/>;
  return<div style={{width:size,height:size,borderRadius:"50%",background:"#111",border:"1.5px solid var(--g35)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Montserrat",fontSize:size*.4,fontWeight:700,color:"var(--gold)",flexShrink:0}}>{(nombre||"?").charAt(0).toUpperCase()}</div>;
}
function SocioBotones({fid,socios,asist,toggle}){
  return<div style={{display:"flex",flexWrap:"wrap",gap:6}}>{socios.map(sc=>{const st=asist[fid+"_"+sc.id]||"";return<button key={sc.id} className="sdot" title={(sc.nombre+(sc.apodo?" "+sc.apodo:""))+": "+ALBL[st]} style={{background:"var(--bg2)",border:"1.5px solid "+ABRD[st],borderRadius:5,padding:"5px 9px",display:"flex",alignItems:"center",gap:5}} onClick={()=>toggle(fid,sc.id)}><span style={{fontFamily:"Montserrat",fontSize:11,fontWeight:500,color:"var(--tx2)"}}>{sc.nombre}</span>{sc.apodo&&<span style={{fontSize:9,color:"var(--tx3)"}}>{sc.apodo}</span>}<span style={{fontSize:13}}>{AICON[st]}</span></button>;})}</div>;
}
function EntradaLog({fecha,titulo,extra,driveLink,onDel}){
  return(
    <div style={{background:"var(--bg2)",border:"1px solid var(--br2)",borderRadius:5,padding:"9px 11px",display:"flex",alignItems:"flex-start",gap:8,marginBottom:6}}>
      <div style={{flex:1}}>
        {fecha&&<p style={{fontSize:10,color:"var(--gold)",fontWeight:600,marginBottom:2}}>📅 {showDate(fecha)}</p>}
        <p style={{fontSize:12,color:"var(--tx)",fontWeight:500}}>{titulo}</p>
        {extra&&<p style={{fontSize:11,color:"var(--tx2)",marginTop:2}}>{extra}</p>}
      </div>
      {driveLink&&<button style={{background:"transparent",border:"none",cursor:"pointer",fontSize:20,flexShrink:0,padding:"0 4px"}} title="Abrir PDF" onClick={()=>window.open(driveLink,"_blank")}>📄</button>}
      <button className="bd" style={{padding:"3px 8px",fontSize:10,flexShrink:0}} onClick={onDel}>✕</button>
    </div>
  );
}

/* ── Formularios aislados (estado local → sin re-renders de App) ── */
const CAMPOS_AN=[
  ["Alcohol","alcohol","%"],["Densidad","densidad","g/L"],["PH","ph",""],
  ["SO₂ total","sulfurosoTotal","mg/L"],["SO₂ libre","sulfurosoLibre","mg/L"],
  ["Acidez volátil","acidezVolatil","g/L"],["Acidez total","acidezTotal","g/L"],
  ["Extracto seco","extractoSeco","g/L"],["Azúcares reductores","azucaresReductores","g/L"],
];

function FormMedicion({onSave,onCancel}){
  const[f,setF]=useState({fecha:todayISO(),alcohol:"",ph:"",comentario:""});
  const s=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  return(
    <div style={{background:"var(--bg2)",border:"1px solid var(--g20)",borderRadius:6,padding:12,marginTop:8}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
        <div><span style={S.LB}>Fecha</span><input type="date" value={f.fecha} onChange={s("fecha")}/></div>
        <div><span style={S.LB}>Alcohol prob. %</span><input value={f.alcohol} onChange={s("alcohol")} placeholder="—"/></div>
        <div><span style={S.LB}>PH</span><input value={f.ph} onChange={s("ph")} placeholder="—"/></div>
      </div>
      <div style={{marginBottom:8}}><span style={S.LB}>Comentario</span><textarea rows={3} value={f.comentario} onChange={s("comentario")} placeholder="Observaciones…"/></div>
      <div style={{display:"flex",gap:8}}>
        <button className="bg" onClick={()=>onSave({id:Date.now(),...f})}>Guardar</button>
        <button className="bo" onClick={onCancel}>Cancelar</button>
      </div>
    </div>
  );
}

function FormSulfuroso({onSave,onCancel}){
  const[f,setF]=useState({fecha:todayISO(),dosis:"",comentario:""});
  const s=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  return(
    <div style={{background:"var(--bg2)",border:"1px solid var(--g20)",borderRadius:6,padding:12,marginTop:8}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div><span style={S.LB}>Fecha</span><input type="date" value={f.fecha} onChange={s("fecha")}/></div>
        <div><span style={S.LB}>Dosis mg/L</span><input value={f.dosis} onChange={s("dosis")} placeholder="—"/></div>
      </div>
      <div style={{marginBottom:8}}><span style={S.LB}>Comentario</span><textarea rows={3} value={f.comentario} onChange={s("comentario")} placeholder="Estado del vino, motivo…"/></div>
      <div style={{display:"flex",gap:8}}>
        <button className="bg" onClick={()=>onSave({id:Date.now(),...f})}>Guardar</button>
        <button className="bo" onClick={onCancel}>Cancelar</button>
      </div>
    </div>
  );
}

function FormHito({onSave,onCancel}){
  const[f,setF]=useState({fecha:todayISO(),descripcion:""});
  const s=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  return(
    <div style={{background:"var(--bg2)",border:"1px solid var(--g20)",borderRadius:6,padding:12,marginTop:8}}>
      <div style={{marginBottom:8}}><span style={S.LB}>Fecha</span><input type="date" value={f.fecha} onChange={s("fecha")}/></div>
      <div style={{marginBottom:8}}><span style={S.LB}>Intervención</span><textarea rows={3} value={f.descripcion} onChange={s("descripcion")} placeholder="Primer trasiego, filtración, adición de bentonita…"/></div>
      <div style={{display:"flex",gap:8}}>
        <button className="bg" onClick={()=>{if(!f.descripcion)return;onSave({id:Date.now(),...f});}}>Guardar</button>
        <button className="bo" onClick={onCancel}>Cancelar</button>
      </div>
    </div>
  );
}

function FormAnalisis({onSave,onCancel}){
  const empty=Object.fromEntries(CAMPOS_AN.map(([,k])=>[k,""]));
  const[f,setF]=useState({fecha:todayISO(),...empty,driveLink:""});
  const s=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  return(
    <div style={{background:"var(--bg2)",border:"1px solid var(--g20)",borderRadius:6,padding:12,marginTop:8}}>
      <div style={{marginBottom:10}}><span style={S.LB}>Fecha del análisis</span><input type="date" value={f.fecha} onChange={s("fecha")}/></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:10}}>
        {CAMPOS_AN.map(([label,key,unit])=>(

            </button>
          ))}
        </div>
      </div>
      <div style={{marginBottom:10}}><span style={S.LB}>Notas</span><input value={f.notas} onChange={s("notas")} placeholder="Opcional…"/></div>

    </div>
  );
}

      if(!v||!vino)return null;
      return<VinoFicha v={v} vino={vino}/>;

    // Nivel 2: lista de vinos de una añada

      const v=vends.find(x=>x.año===openV);

      return<VinoList v={v}/>;

          <h2 style={{...S.H2,marginBottom:0}}>Añada {v.año}</h2>

        <p style={S.DSC}>Vinos elaborados en {v.año} · Toca un vino para gestionar su ficha</p>
        {(v.vinos||[]).map(vino=>{
          return(
            <div key={vino.id} className="card" style={{...S.C,marginBottom:8,cursor:"pointer"}} onClick={()=>setOpenVino(vino.id)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <p style={{fontFamily:"Montserrat",fontSize:15,fontWeight:700,color:"var(--gold)",marginBottom:4}}>{vino.nombre}</p>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {vino.litros>0&&<span style={{fontSize:11,color:"var(--tx2)"}}>🍶 {vino.litros} L</span>}
                    {vinoKg(vino)>0&&<span style={{fontSize:11,color:"var(--tx2)"}}>⚖️ {vinoKg(vino)} kg</span>}
                    {(vino.variedades||[]).map(va=><span key={va} style={S.TG}>{va}</span>)}
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  {vino.analisis?.length>0&&<p style={{fontSize:10,color:"var(--tx3)"}}>📊 {vino.analisis.length} análisis</p>}
                  <p style={{fontSize:10,color:"var(--gold)",marginTop:4}}>▶ Abrir ficha</p>
                </div>
              </div>
            </div>
          );
        })}
        {showAddVino?(
          <div style={{...S.DB,borderRadius:7,borderTop:"1px solid var(--br)",padding:14,marginTop:8}}>
            <p style={{...S.H3,marginBottom:12}}>Nombre del nuevo vino</p>
            <input value={nombreNuevo} onChange={e=>setNombreNuevo(e.target.value)} placeholder="Ej: Garnacha Joven 2025"/>
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button className="bg" onClick={()=>{
                if(!nombreNuevo.trim())return;
                const nv=makeVino(nombreNuevo.trim());
                setVends(p=>p.map(x=>x.año===v.año?{...x,vinos:[...x.vinos,nv]}:x));
                setNombreNuevo("Vino "+(v.vinos.length+2));
                setShowAddVino(false);
              }}>Añadir vino</button>
              <button className="bo" onClick={()=>setShowAddVino(false)}>Cancelar</button>
            </div>
          </div>
        ):(
          <button className="bg" style={{width:"100%",padding:10,marginTop:8}} onClick={()=>setShowAddVino(true)}>+ Añadir vino</button>
        )}
      </div>
    );
  }

  function VinoFicha({v,vino}){
    const vt=vSubTab[vino.id]||"general";
    const setVT=t=>setVSubTab(p=>({...p,[vino.id]:t}));
    const upd=(k,val)=>svino(v.año,vino.id,k,val);

    function rGeneral(){
      return(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div><span style={S.LB}>Fecha de vendimia</span><SD value={vino.fechaVendimia||""} save={val=>upd("fechaVendimia",val)}/></div>
            <div><span style={S.LB}>Litros de vino</span><SN value={vino.litros||""} save={val=>upd("litros",val)} placeholder="0"/></div>
            <div><span style={S.LB}>Densidad (g/L)</span><SI value={vino.densidad||""} save={val=>upd("densidad",val)} placeholder="—"/></div>
            <div><span style={S.LB}>PH</span><SI value={vino.ph||""} save={val=>upd("ph",val)} placeholder="—"/></div>
          </div>
          <div style={{marginBottom:12}}>
            <span style={S.LB}>Variedades</span>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}}>
              {VARIEDADES.map(va=>{const sel=(vino.variedades||[]).includes(va);return<button key={va} style={{background:sel?"var(--g20)":"transparent",border:"1px solid "+(sel?"var(--g50)":"var(--br2)"),borderRadius:5,padding:"5px 12px",cursor:"pointer",fontFamily:"Montserrat",fontSize:11,fontWeight:600,color:sel?"var(--gold)":"var(--tx2)"}} onClick={()=>{const c=vino.variedades||[];upd("variedades",sel?c.filter(x=>x!==va):[...c,va]);}}>{va}</button>;})}
            </div>
          </div>
          <div style={{marginBottom:10}}><span style={S.LB}>Descripción de la añada</span><ST value={vino.notas||""} save={val=>upd("notas",val)} rows={4} placeholder="Descripción general, condiciones climáticas…"/></div>
          <div style={{marginBottom:10}}><span style={S.LB}>Nota de Cata</span><ST value={vino.notaCata||""} save={val=>upd("notaCata",val)} rows={4} placeholder="Aromas, sabores, estructura, final de boca…"/></div>
        </div>
      );
    }

    function rViñas(){
      function updViña(viñas){sviña(v.año,vino.id,viñas);}
      return(
        <div>
          {(vino.viñas||[]).map((vn,i)=>{
            const tot=viñaKg(vn);
            return(
              <div key={vn.nombre} style={{...S.C,marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <p style={{fontFamily:"Montserrat",fontSize:13,fontWeight:700,color:"var(--gold)"}}>🍇 {vn.nombre}</p>
                  <p style={{fontFamily:"'Crimson Pro',serif",fontSize:16,color:"var(--tx2)"}}>Total: <span style={{color:"var(--gold)",fontWeight:700}}>{tot} kg</span></p>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 30px",gap:8,marginBottom:6}}>
                  <span style={{fontSize:9,fontWeight:600,letterSpacing:".1em",textTransform:"uppercase",color:"var(--tx3)"}}>Variedad</span>
                  <span style={{fontSize:9,fontWeight:600,letterSpacing:".1em",textTransform:"uppercase",color:"var(--tx3)"}}>Kg</span>
                  <span/>
                </div>
                {(vn.variedades||[]).map((va,j)=>(
                  <div key={j} style={{display:"grid",gridTemplateColumns:"2fr 1fr 30px",gap:8,alignItems:"center",marginBottom:8}}>
                    <select value={va.variedad} onChange={e=>{const nv=[...vino.viñas];const nvs=[...(nv[i].variedades||[])];nvs[j]={...va,variedad:e.target.value};nv[i]={...nv[i],variedades:nvs};updViña(nv);}}>{VARIEDADES.map(v2=><option key={v2}>{v2}</option>)}</select>
                    <SN value={va.kg||""} save={val=>{const nv=[...vino.viñas];const nvs=[...(nv[i].variedades||[])];nvs[j]={...va,kg:val};nv[i]={...nv[i],variedades:nvs};updViña(nv);}} placeholder="0"/>
                    {(vn.variedades||[]).length>1?<button className="bd" style={{padding:"5px 4px",fontSize:12,textAlign:"center"}} onClick={()=>{const nv=[...vino.viñas];nv[i]={...nv[i],variedades:(nv[i].variedades||[]).filter((_,k)=>k!==j)};updViña(nv);}}>✕</button>:<span/>}
                  </div>
                ))}
                <button className="be" style={{width:"100%",padding:"7px 0",marginTop:4}} onClick={()=>{const nv=[...vino.viñas];nv[i]={...nv[i],variedades:[...(nv[i].variedades||[]),{variedad:"Garnacha",kg:0}]};updViña(nv);}}>+ Añadir variedad</button>
              </div>
            );
          })}
          <div style={{...S.C,background:"rgba(232,168,32,.05)"}}><p style={{fontSize:12,color:"var(--tx2)"}}>Total: <span style={{color:"var(--gold)",fontWeight:700}}>{vinoKg(vino)} kg</span>{" · "}{(vino.viñas||[]).map(vn=>vn.nombre+": "+viñaKg(vn)+"kg").join(" · ")}</p></div>
        </div>
      );
    }

    function rCampo(){
      const meds=vino.medicionesCampo||[];
      return(
        <div>
          <p style={{fontSize:12,color:"var(--tx2)",marginBottom:12}}>Registro acumulado de mediciones en campo.</p>
          {meds.map(m=><EntradaLog key={m.id} fecha={m.fecha} titulo={"Alcohol prob.: "+(m.alcohol||"—")+"% · PH: "+(m.ph||"—")} extra={m.comentario} onDel={()=>upd("medicionesCampo",meds.filter(x=>x.id!==m.id))}/>)}
          {showMed===vino.id?<FormMedicion onSave={data=>{upd("medicionesCampo",[...meds,data]);setShowMed(null);}} onCancel={()=>setShowMed(null)}/>:<button className="bg" style={{width:"100%",padding:10,marginTop:8}} onClick={()=>setShowMed(vino.id)}>+ Añadir medición</button>}
        </div>
      );
    }

    function rSulfuroso(){
      const sulfs=vino.sulfuroso||[];
      const total=sulfs.reduce((s,x)=>s+(+x.dosis||0),0);
      return(
        <div>
          {total>0&&<p style={{fontSize:11,color:"var(--gold)",fontWeight:600,marginBottom:12}}>Total acumulado: {total} mg/L</p>}
          {sulfs.map(s=><EntradaLog key={s.id} fecha={s.fecha} titulo={"Dosis: "+(s.dosis||"—")+" mg/L"} extra={s.comentario} onDel={()=>upd("sulfuroso",sulfs.filter(x=>x.id!==s.id))}/>)}
          {showSulf===vino.id?<FormSulfuroso onSave={data=>{upd("sulfuroso",[...sulfs,data]);setShowSulf(null);}} onCancel={()=>setShowSulf(null)}/>:<button className="bg" style={{width:"100%",padding:10,marginTop:8}} onClick={()=>setShowSulf(vino.id)}>+ Registrar adición de sulfuroso</button>}
        </div>
      );
    }

    function rAnalisis(){
      const lista=vino.analisis||[];
      return(
        <div>
          <p style={{fontSize:12,color:"var(--tx2)",marginBottom:12}}>Historial de análisis de laboratorio.</p>
          {lista.map(an=>{
            const key=vino.id+"-"+an.id;
            const isO=openAnal===key;
            return(
              <div key={an.id} style={{marginBottom:8}}>
                <div className={"vc card "+(isO?"op":"")} style={{...S.C,padding:"11px 13px"}} onClick={()=>setOpenAnal(isO?null:key)}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{flex:1}}>
                      {an.fecha&&<p style={{fontSize:10,color:"var(--gold)",fontWeight:600,marginBottom:4}}>📅 {showDate(an.fecha)}</p>}
                      <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
                        {an.alcohol&&<span style={{fontSize:12,color:"var(--tx)"}}><span style={{color:"var(--tx3)",fontSize:10}}>Alc. </span>{an.alcohol}%</span>}
                        {an.ph&&<span style={{fontSize:12,color:"var(--tx)"}}><span style={{color:"var(--tx3)",fontSize:10}}>PH </span>{an.ph}</span>}
                        {an.densidad&&<span style={{fontSize:12,color:"var(--tx)"}}><span style={{color:"var(--tx3)",fontSize:10}}>Dens. </span>{an.densidad}</span>}
                      </div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                      {an.driveLink&&<button style={{background:"transparent",border:"none",cursor:"pointer",fontSize:22,padding:"0 2px"}} title="Abrir PDF" onClick={e=>{e.stopPropagation();window.open(an.driveLink,"_blank");}}>📄</button>}
                      <span style={{fontSize:10,color:"var(--gold)"}}>{isO?"▲":"▼"}</span>
                    </div>
                  </div>
                </div>
                {isO&&(
                  <div style={S.DB}>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:10}}>
                      {CAMPOS_AN.map(([label,key,unit])=>an[key]?<div key={key}><span style={S.LB}>{label}{unit?" ("+unit+")":""}</span><p style={{fontFamily:"'Crimson Pro',serif",fontSize:20,color:"var(--tx)"}}>{an[key]}</p></div>:null)}
                    </div>
                    {an.driveLink&&<button className="bg" style={{width:"100%",padding:9,marginBottom:10}} onClick={()=>window.open(an.driveLink,"_blank")}>📄 Abrir PDF en Google Drive</button>}
                    <button className="bd" onClick={()=>upd("analisis",lista.filter(x=>x.id!==an.id))}>Eliminar análisis</button>
                  </div>
                )}
              </div>
            );
          })}
          {showAnal===vino.id?<FormAnalisis onSave={data=>{upd("analisis",[...lista,data]);setShowAnal(null);}} onCancel={()=>setShowAnal(null)}/>:<button className="bg" style={{width:"100%",padding:10,marginTop:8}} onClick={()=>setShowAnal(vino.id)}>+ Añadir análisis</button>}
        </div>
      );
    }

    function rHitos(){
      const todos=[
        ...(vino.hitos||[]).map(h=>({...h,_t:"hito"})),
        ...(vino.medicionesCampo||[]).map(m=>({...m,_t:"campo",descripcion:"Campo — Alc.: "+(m.alcohol||"—")+"% · PH: "+(m.ph||"—")+(m.comentario?" · "+m.comentario:"")})),
        ...(vino.sulfuroso||[]).map(s=>({...s,_t:"sulf",descripcion:"SO₂ — "+(s.dosis||"—")+" mg/L"+(s.comentario?" · "+s.comentario:"")})),
        ...(vino.analisis||[]).map(a=>({...a,_t:"anal",descripcion:"Análisis lab. — Alc.: "+(a.alcohol||"—")+"% · PH: "+(a.ph||"—")})),
      ].sort((a,b)=>{const da=parseDate(a.fecha),db=parseDate(b.fecha);if(!da&&!db)return 0;if(!da)return 1;if(!db)return-1;return da-db;});
      const iconT={hito:"📌",campo:"🔬",sulf:"🧪",anal:"📊"};
      return(
        <div>
          {todos.map((h,i)=>(
            <div key={h.id||i} style={{display:"flex",gap:10,marginBottom:8}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:"var(--g10)",border:"1px solid var(--g20)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>{iconT[h._t]||"📌"}</div>
                {i<todos.length-1&&<div style={{width:1,flex:1,background:"var(--br2)",margin:"3px 0"}}/>}
              </div>
              <div style={{flex:1,paddingBottom:8}}>
                {h.fecha&&<p style={{fontSize:10,color:"var(--gold)",fontWeight:600,marginBottom:2}}>📅 {showDate(h.fecha)}</p>}
                <p style={{fontSize:12,color:"var(--tx)",lineHeight:1.5}}>{h.descripcion}</p>
                {h._t==="hito"&&<button className="bd" style={{padding:"2px 7px",fontSize:9,marginTop:4}} onClick={()=>upd("hitos",(vino.hitos||[]).filter(x=>x.id!==h.id))}>✕</button>}
              </div>
            </div>
          ))}
          {showHito===vino.id?<FormHito onSave={data=>{upd("hitos",[...(vino.hitos||[]),data]);setShowHito(null);}} onCancel={()=>setShowHito(null)}/>:<button className="bg" style={{width:"100%",padding:10,marginTop:8}} onClick={()=>setShowHito(vino.id)}>+ Añadir hito</button>}
        </div>
      );
    }

    return(
      <div className="fade">
        {/* Breadcrumb */}
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:14,flexWrap:"wrap"}}>
          <button className="bo" style={{padding:"4px 9px",fontSize:11}} onClick={()=>{setOpenVino(null);setShowAddVino(false);}}>◀ {v.año}</button>
          <span style={{fontSize:10,color:"var(--tx3)"}}>›</span>
          <span style={{fontFamily:"Montserrat",fontSize:12,fontWeight:700,color:"var(--gold)"}}>{vino.nombre}</span>
        </div>

        {/* Header del vino */}
        <div style={{...S.C,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <SI value={vino.nombre} save={val=>upd("nombre",val)}
                style={{fontFamily:"'Crimson Pro',serif",fontSize:24,color:"var(--gold)",background:"transparent",border:"none",borderBottom:"1px dashed rgba(232,168,32,.3)",padding:"2px 0",marginBottom:6}}/>
              <p style={{fontSize:11,color:"var(--tx2)"}}>Añada {v.año} · Toca el nombre para editarlo</p>
            </div>
            <div style={{textAlign:"right"}}>
              {vino.litros>0&&<p style={{fontFamily:"'Crimson Pro',serif",fontSize:22,color:"var(--tx)"}}>{vino.litros} L</p>}
              {vinoKg(vino)>0&&<p style={{fontSize:11,color:"var(--tx2)"}}>{vinoKg(vino)} kg</p>}
            </div>
          </div>
          <button className="bd" style={{marginTop:10,fontSize:9}} onClick={()=>{if(window.confirm("¿Eliminar el vino '"+vino.nombre+"'? Se perderán todos sus datos.")){setVends(p=>p.map(x=>x.año===v.año?{...x,vinos:x.vinos.filter(vn=>vn.id!==vino.id)}:x));setOpenVino(null);}}}>Eliminar este vino</button>
        </div>

        {/* Sub-tabs */}
        <div style={{display:"flex",overflowX:"auto",gap:3,marginBottom:16,paddingBottom:10,borderBottom:"1px solid var(--br2)"}}>
          {V_TABS.map(t=><button key={t.id} className={"vtb "+(vt===t.id?"a":"")} onClick={()=>setVT(t.id)}>{t.l}</button>)}
        </div>

        {vt==="general"   &&rGeneral()}
        {vt==="vinas"     &&rViñas()}
        {vt==="campo"     &&rCampo()}
        {vt==="sulfuroso" &&rSulfuroso()}
        {vt==="analisis"  &&rAnalisis()}
        {vt==="hitos"     &&rHitos()}
      </div>
    );
  }

  /* ══ FAENAS ═══════════════════════════════════════════════════════ */
  function Faenas(){
    const mesAct=MESES[new Date().getMonth()];
    const porMes=MESES.reduce((acc,m)=>{const fs=fSort.filter(f=>f.mes===m);if(fs.length)acc[m]=fs;return acc;},{});
    function copiar(){const ant=faenas.filter(f=>f.año===fYear-1);if(!ant.length){alert("No hay faenas del año "+(fYear-1)+" para copiar.");return;}setFaenas(p=>[...p,...ant.map(f=>({...f,id:Date.now()+Math.random(),año:fYear,dia:""}))]);}
    return(
      <div className="fade">
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          <h2 style={{...S.H2,marginBottom:0}}>Faenas</h2>
          <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:"auto"}}>
            <button className="bo" style={{padding:"5px 10px"}} onClick={()=>setFYear(y=>y-1)}>◀</button>
            <span style={{fontFamily:"'Crimson Pro',serif",fontSize:24,color:"var(--gold)",minWidth:48,textAlign:"center"}}>{fYear}</span>
            <button className="bo" style={{padding:"5px 10px"}} onClick={()=>setFYear(y=>y+1)}>▶</button>
          </div>
        </div>
        {fSort.length===0?(
          <div style={{...S.C,textAlign:"center",padding:24,marginBottom:16}}>
            <p style={{fontSize:13,color:"var(--tx2)",marginBottom:14}}>No hay faenas para {fYear}.</p>
            <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}><button className="bg" onClick={copiar}>Copiar de {fYear-1}</button><button className="bo" onClick={()=>setAddF(true)}>+ Crear primera faena</button></div>
          </div>
        ):(
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
            <p style={S.DSC}>Toca un socio para confirmar asistencia</p>
            <div style={{display:"flex",gap:6}}><button className="bo" style={{fontSize:9}} onClick={copiar}>Copiar de {fYear-1}</button><button className="bg" onClick={()=>setAddF(!addF)}>+ Añadir</button></div>
          </div>
        )}
        {addF&&(
          <div style={{...S.DB,borderRadius:7,borderTop:"1px solid var(--br)",marginBottom:12,padding:14}}>
            <p style={{...S.H3,marginBottom:12}}>Nueva faena · {fYear}</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 52px 1fr",gap:8}}>
              <SI value={nF.nombre} save={val=>setNF(p=>({...p,nombre:val}))} placeholder="Nombre"/>
              <SI value={nF.emoji} save={val=>setNF(p=>({...p,emoji:val}))} placeholder="🍇" style={{textAlign:"center"}}/>
              <select value={nF.mes} onChange={e=>setNF(p=>({...p,mes:e.target.value}))}>{MESES.map(m=><option key={m}>{m}</option>)}</select>
            </div>
            <div style={{marginTop:8}}><ST value={nF.desc} save={val=>setNF(p=>({...p,desc:val}))} rows={2} placeholder="Descripción"/></div>
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button className="bg" onClick={()=>{if(!nF.nombre)return;setFaenas(p=>[...p,{id:Date.now(),año:fYear,...nF,dia:""}]);setNF({nombre:"",emoji:"",mes:"Enero",desc:""});setAddF(false);}}>Guardar</button>
              <button className="bo" onClick={()=>setAddF(false)}>Cancelar</button>
            </div>
          </div>
        )}
        {Object.entries(porMes).map(([mes,flist])=>(
          <div key={mes} style={{marginBottom:22}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,paddingBottom:7,borderBottom:"1px solid var(--br2)"}}>
              <span style={{fontFamily:"Montserrat",fontSize:14,fontWeight:700,letterSpacing:".14em",textTransform:"uppercase",color:mes===mesAct?"var(--gold)":"var(--tx2)"}}>{mes}</span>
              {mes===mesAct&&<span style={S.MB}>MES ACTUAL</span>}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              {flist.map(f=>{
                const conf=socios.filter(sc=>ga(f.id,sc.id)==="si").length;
                const dias=diasR(f.dia);
                const dc=dias===null?"var(--tx3)":dias===0?"rgba(255,220,50,.95)":dias<0?"rgba(200,80,80,.7)":dias<=7?"rgba(255,150,50,.9)":dias<=30?"var(--gold)":"var(--tx3)";
                return(
                  <div key={f.id} style={{...S.C}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:10}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4,flexWrap:"wrap"}}>
                          <span style={{fontSize:18}}>{f.emoji||"🔧"}</span>
                          <span style={{fontFamily:"Montserrat",fontSize:13,fontWeight:700,color:"var(--tx)"}}>{f.nombre}</span>
                          {editFmes===f.id?<select value={f.mes} onChange={e=>sf(f.id,"mes",e.target.value)} style={{width:120,padding:"3px 6px",fontSize:11}}>{MESES.map(m=><option key={m}>{m}</option>)}</select>:<span style={S.MB} className="editable" onClick={()=>setEditFmes(f.id)}>{f.mes}</span>}
                        </div>
                        <p style={{fontSize:11,color:"var(--tx2)",lineHeight:1.5,marginBottom:8}}>{f.desc}</p>
                        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>

  /* ══ ECONOMÍA ════════════════════════════════════════════════════ */
  function Economia(){
    const gastosVis=ecoAño===0?gastos:gastos.filter(g=>String(g.año)===String(ecoAño));
    const totalVis=gastosVis.reduce((s,g)=>s+(+g.importe||0),0);
    const totalGeneral=gastos.reduce((s,g)=>s+(+g.importe||0),0);
    const invRow=ecoAño>0?invCat.find(x=>false):null; // not used for bottles; use a separate state
    // Botella count from inventory data per year - we look at inv
    // Actually bottles are not in invCat, they're tracked separately. For now use 0 unless user adds.
    // Use a per-year bottles override stored in gastos metadata — simpler: just allow user to set it
    // For the chart
    const chartData=AÑOS_V.map(año=>{
      const gAño=gastos.filter(g=>String(g.año)===String(año));
      const total=gAño.reduce((s,g)=>s+(+g.importe||0),0);
      return{año,total};
    }).filter(d=>d.total>0);
    const maxChart=Math.max(...chartData.map(d=>d.total),1);
    // Per-año calcs
    const nSocios=socios.length||6;
    const gastosAño=gastos.filter(g=>String(g.año)===String(ecoAño));
    const totalAño=gastosAño.reduce((s,g)=>s+(+g.importe||0),0);
    // Botellas: from a simple per-year config stored in gastos as special entries
    // Better approach: use a separate localStorage key for bottles per year
    const[botAnual,setBotAnual]=useState(()=>load("o7_bot",{}));
    useEffect(()=>{localStorage.setItem("o7_bot",JSON.stringify(botAnual));},[botAnual]);
    const botellas=ecoAño>0?(+botAnual[String(ecoAño)]||0):0;
    const costeXBot=botellas>0?(totalAño/botellas).toFixed(2):null;
    const botXSoc=botellas>0?(botellas/nSocios).toFixed(1):null;
    const costeXSoc=costeXBot&&botXSoc?(+costeXBot*+botXSoc).toFixed(2):null;
    const porCat=CATS_ECO.map(c=>({...c,total:gastosVis.filter(g=>g.categoria===c.id).reduce((s,g)=>s+(+g.importe||0),0)})).filter(c=>c.total>0);
    const gastosOrd=[...gastosVis].sort((a,b)=>{const da=parseDate(a.fecha),db=parseDate(b.fecha);if(!da&&!db)return 0;if(!da)return 1;if(!db)return-1;return db-da;});

    return(
      <div className="fade">
        <h2 style={S.H2}>Economía</h2>
        <p style={S.DSC}>Control de gastos · Coste real por botella y por socio</p>

        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:22}}>
          {[["💰",totalGeneral.toFixed(2)+"€","Total gastado"],["📆",gastos.filter(g=>String(g.año)===String(new Date().getFullYear())).reduce((s,g)=>s+(+g.importe||0),0).toFixed(2)+"€","Año en curso"],["🍾",String(gastos.length),"Apuntes"]].map(([ic,v,l])=>(
            <div key={l} style={{...S.C,textAlign:"center",padding:"12px 8px"}}>
              <p style={{fontSize:20,marginBottom:3}}>{ic}</p>
              <p style={{fontFamily:"'Crimson Pro',serif",fontSize:18,color:"var(--gold)",lineHeight:1}}>{v}</p>
              <p style={{fontSize:9,fontWeight:600,letterSpacing:".07em",textTransform:"uppercase",color:"var(--tx3)",marginTop:3}}>{l}</p>
            </div>
          ))}
        </div>

        {/* Filtro año */}
        <p style={{...S.H3,marginBottom:8}}>Filtrar por añada</p>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:16}}>
          {[0,...AÑOS_V].map(a=>(
            <button key={a} className={"vtb "+(ecoAño===a?"a":"")} style={{padding:"6px 10px",fontSize:10}} onClick={()=>setEcoAño(a)}>{a===0?"Todos":a}</button>

        {/* Gráfico en vista "Todos" */}

          <div style={{...S.C,marginBottom:16}}>
            <p style={{...S.H3,marginBottom:14}}>Gasto total por añada</p>
            <div style={{display:"flex",alignItems:"flex-end",gap:6,height:90,padding:"0 4px"}}>
              {chartData.map(d=>(
                <div key={d.año} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <span style={{fontSize:9,color:"var(--gold)",fontWeight:600}}>{d.total.toFixed(0)}€</span>
                  <div style={{width:"100%",height:(d.total/maxChart*72)+"px",background:"linear-gradient(180deg,var(--gold),rgba(232,168,32,.3))",borderRadius:"3px 3px 0 0",minHeight:4}}/>

                </div>

          </div>

        {ecoAño>0&&(
          <div style={{...S.C,background:"rgba(232,168,32,.06)",border:"1px solid var(--g20)",marginBottom:16}}>

              <div style={S.C}>
                <span style={S.LB}>Botellas llenadas</span>

                <p style={{fontSize:10,color:"var(--tx3)",marginTop:4}}>Introduce el número para calcular</p>

            </div>
            {botellas>0&&costeXBot?(

                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
                  <div style={{...S.C,textAlign:"center"}}><span style={S.LB}>Botellas/socio</span><p style={{fontFamily:"'Crimson Pro',serif",fontSize:26,color:"var(--tx)"}}>{botXSoc}</p><p style={{fontSize:9,color:"var(--tx3)",marginTop:2}}>{nSocios} socios</p></div>

                  <div style={{...S.C,textAlign:"center",border:"1px solid var(--g35)"}}><span style={S.LB}>Coste/socio</span><p style={{fontFamily:"'Crimson Pro',serif",fontSize:26,color:"var(--gold)"}}>{costeXSoc}€</p></div>
                </div>
                <div style={{...S.C,background:"rgba(0,0,0,.2)",marginBottom:10}}>
                  <p style={{...S.H3,marginBottom:10,fontSize:10}}>Desglose por socio</p>
                  {socios.map(sc=>(
                    <div key={sc.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid var(--br2)"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <Av nombre={sc.nombre} foto={sc.foto} size={26}/>
                        <span style={{fontSize:12,color:"var(--tx)"}}>{sc.nombre}{sc.apodo?" "+sc.apodo:""}</span>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <span style={{fontFamily:"'Crimson Pro',serif",fontSize:18,color:"var(--gold)"}}>{costeXSoc}€</span>
                        <span style={{fontSize:10,color:"var(--tx3)",marginLeft:6}}>({botXSoc} bots.)</span>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            ):(
              <p style={{fontSize:12,color:"var(--tx3)",textAlign:"center",padding:"8px 0"}}>Introduce el número de botellas llenadas para ver el cálculo.</p>

            {porCat.length>0&&(

                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {porCat.map(c=>(

                      <span style={{fontSize:11,color:"var(--tx2)"}}>{c.label}</span>
                      <span style={{fontFamily:"'Crimson Pro',serif",fontSize:15,color:"var(--gold)",marginLeft:3}}>{c.total.toFixed(2)}€</span>
                    </div>
                  ))}

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,flexWrap:"wrap",gap:8}}>
          <div>

        {showGasto&&<FormGasto añoDefault={ecoAño>0?ecoAño:""} onSave={data=>{setGastos(p=>[...p,data]);setShowGasto(false);}} onCancel={()=>setShowGasto(false)}/>}
        {gastosOrd.length===0&&!showGasto&&<p style={{fontSize:12,color:"var(--tx3)",textAlign:"center",margin:"24px 0"}}>Sin gastos{ecoAño>0?" para "+ecoAño:""}.</p>}
        {gastosOrd.map(g=>{
          const cat=CATS_ECO.find(c=>c.id===g.categoria)||CATS_ECO[CATS_ECO.length-1];
          return(
            <div key={g.id} style={{background:"var(--bg2)",border:"1px solid var(--br2)",borderRadius:5,padding:"10px 12px",marginBottom:6}}>

                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:4}}>
                    <span style={{fontSize:15}}>{cat.emoji}</span>
                    <span style={{fontSize:12,fontWeight:600,color:"var(--tx)"}}>{g.concepto}</span>
                    <span style={{...S.TG,fontSize:9}}>{cat.label}</span>

                  {g.fecha&&<span style={{fontSize:10,color:"var(--tx3)"}}>📅 {showDate(g.fecha)}</span>}

  /* ══ SOCIOS ══════════════════════════════════════════════════════ */
  function Socios(){
    // Photo upload helper
    function handleFoto(sc){
      const input=document.createElement("input");
      input.type="file";input.accept="image/*";
      input.onchange=e=>{
        const file=e.target.files[0];if(!file)return;
        const reader=new FileReader();
        reader.onload=ev=>{
          const img=new Image();
          img.onload=()=>{
            const canvas=document.createElement("canvas");
            const size=180;
            const ratio=Math.min(size/img.width,size/img.height);
            canvas.width=Math.round(img.width*ratio);
            canvas.height=Math.round(img.height*ratio);
            canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
            ss(sc.id,"foto",canvas.toDataURL("image/jpeg",0.8));
          };
          img.src=ev.target.result;
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }

    if(openSocio!==null){
      const sc=socios.find(x=>x.id===openSocio);
      if(!sc)return null;
      const edad=calcEdad(sc.fechaNacimiento);
      return(
        <div className="fade">
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <button className="bo" style={{padding:"5px 10px",fontSize:12}} onClick={()=>setOpenSocio(null)}>◀</button>
            <h2 style={{...S.H2,marginBottom:0}}>Ficha de socio</h2>
          </div>
          <div style={{...S.C,marginBottom:12}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:14,marginBottom:16}}>
              <div style={{position:"relative",flexShrink:0}}>
                <Av nombre={sc.nombre} foto={sc.foto} size={80}/>
                <button className="be" style={{position:"absolute",bottom:-4,right:-4,padding:"3px 6px",fontSize:10}} onClick={()=>handleFoto(sc)}>📷</button>
              </div>
              <div style={{flex:1}}>
                <p style={{fontFamily:"'Crimson Pro',serif",fontSize:26,color:"var(--gold)"}}>{sc.nombre}{sc.apodo?" "+sc.apodo:""}</p>
                <p style={{fontSize:11,color:"var(--tx2)",textTransform:"uppercase",letterSpacing:".08em"}}>{sc.rol}</p>
                {edad!==null&&<p style={{fontSize:12,color:"var(--tx3)",marginTop:3}}>{edad} años</p>}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

              <div><span style={S.LB}>Apodo / distinción</span><SI value={sc.apodo||""} save={val=>ss(sc.id,"apodo",val)} placeholder="(Padre), (Hijo)…"/></div>
              <div style={{gridColumn:"1/-1"}}><span style={S.LB}>Nombre completo</span><SI value={sc.nombreCompleto||""} save={val=>ss(sc.id,"nombreCompleto",val)} placeholder="Nombre y apellidos…"/></div>
              <div><span style={S.LB}>Fecha de nacimiento</span><SD value={sc.fechaNacimiento||""} save={val=>ss(sc.id,"fechaNacimiento",val)}/></div>
              <div><span style={S.LB}>Pseudónimo / Apelativo</span><SI value={sc.pseudonimo||""} save={val=>ss(sc.id,"pseudonimo",val)} placeholder="El bodeguero…"/></div>
              <div style={{gridColumn:"1/-1"}}><span style={S.LB}>Valor que aporta a la bodega</span><ST value={sc.valorAporta||""} save={val=>ss(sc.id,"valorAporta",val)} rows={3} placeholder="Conocimientos, trabajo, equipamiento…"/></div>
            </div>

          <button className="bg" onClick={()=>setAddS(!addS)}>+ Añadir</button>
        </div>
        {addS&&(
          <div style={{...S.DB,borderRadius:7,borderTop:"1px solid var(--br)",marginBottom:12,padding:14}}>
            <p style={{...S.H3,marginBottom:12}}>Nuevo socio</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <SI value={nS.nombre} save={val=>setNS(p=>({...p,nombre:val}))} placeholder="Nombre"/>
              <SI value={nS.apodo} save={val=>setNS(p=>({...p,apodo:val}))} placeholder="(Padre), (Hijo)…"/>
            </div>
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button className="bg" onClick={()=>{if(!nS.nombre)return;setSocios(p=>[...p,{id:Date.now(),...nS,nombreCompleto:"",fechaNacimiento:"",pseudonimo:"",valorAporta:"",foto:""}]);setNS({nombre:"",apodo:"",rol:"Socio"});setAddS(false);}}>Guardar</button>
              <button className="bo" onClick={()=>setAddS(false)}>Cancelar</button>
            </div>
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10}}>
          {socios.map(sc=>{
            const conf=faenas.filter(f=>ga(f.id,sc.id)==="si").length;
            const pct=faenas.length>0?Math.round((conf/faenas.length)*100):0;
            const edad=calcEdad(sc.fechaNacimiento);
            return(
              <div key={sc.id} className="card" style={{...S.C,textAlign:"center",padding:"18px 12px",cursor:"pointer"}} onClick={()=>setOpenSocio(sc.id)}>
                <div style={{position:"relative",display:"inline-block",marginBottom:10}}>
                  <Av nombre={sc.nombre} foto={sc.foto} size={60}/>
                  <button className="be" style={{position:"absolute",bottom:-2,right:-2,padding:"2px 5px",fontSize:10}} onClick={e=>{e.stopPropagation();handleFoto(sc);}}>📷</button>
                </div>
                <p style={{fontFamily:"Montserrat",fontSize:14,fontWeight:700,color:"var(--tx)",marginBottom:1}}>{sc.nombre}</p>
                {sc.apodo&&<p style={{fontSize:11,color:"var(--tx2)",marginBottom:1}}>{sc.apodo}</p>}
                <p style={{fontSize:10,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"var(--gold)",marginBottom:2}}>{sc.rol}</p>
                {edad!==null&&<p style={{fontSize:10,color:"var(--tx3)",marginBottom:10}}>{edad} años</p>}
                {sc.pseudonimo&&<p style={{fontSize:10,color:"var(--tx3)",fontStyle:"italic",marginBottom:10}}>"{sc.pseudonimo}"</p>}
                <div style={{display:"flex",justifyContent:"space-around",borderTop:"1px solid var(--br2)",paddingTop:10}}>
                  <div><p style={{fontFamily:"'Crimson Pro',serif",fontSize:20,color:"var(--gold)"}}>{conf}</p><p style={{fontSize:9,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"var(--tx3)"}}>Faenas</p></div>
                  <div><p style={{fontFamily:"'Crimson Pro',serif",fontSize:20,color:"var(--gold)"}}>{pct}%</p><p style={{fontSize:9,fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"var(--tx3)"}}>Part.</p></div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  /* ══ IDIOSINCRASIA ═══════════════════════════════════════════════ */
  function Idiosincrasia(){
    return(
      <div className="fade">
        <div style={{textAlign:"center",padding:"28px 0 20px",borderBottom:"1px solid var(--br2)",marginBottom:28}}>
          <OriLogo size={52}/>
          <h1 style={{fontFamily:"Montserrat",fontSize:22,fontWeight:700,letterSpacing:".22em",textTransform:"uppercase",color:"var(--gold)",marginTop:14}}>QUIÉNES SOMOS</h1>
          <p style={{fontFamily:"Montserrat",fontSize:10,letterSpacing:".16em",textTransform:"uppercase",color:"var(--tx3)",marginTop:6}}>Familia Oriol · Bodega Quebracántaros · Valdejalón</p>
        </div>

        <div style={{maxWidth:640,margin:"0 auto"}}>
          {[
            {emoji:"🍷",titulo:"Nuestro origen",texto:"Somos la familia Oriol al completo: padres, hijos y, con el paso del tiempo, consortes y nietos a quienes hemos tenido el placer de contagiar nuestro amor por el vino. Siempre hemos compartido este líquido elemento alrededor de una mesa, charlando, discutiendo sus matices, soñando con elaborarlo nosotros mismos."},
            {emoji:"🏚️",titulo:"El nacimiento de la bodega",texto:"En 2020 nació Bodega Orioles con una intención clara y apasionada: crear el mejor vino que seamos capaces de bebernos. Sin más pretensión que la del disfrute y el aprendizaje. Con nuestros propios medios, unas veces más rudimentarios y otras con cierta tecnología, hemos ido avanzando juntos hacia ese objetivo común."},
            {emoji:"🌱",titulo:"Aprendizaje y progreso",texto:"Nada es sencillo cuando se empieza de cero. Pero la familia que somos, unida, no encuentra límite que no pueda superar con tiempo, dedicación y muchas ganas. Cada vendimia nos enseña algo nuevo. Cada vino que sale de nuestra bodega lleva consigo el esfuerzo colectivo de todos y cada uno de nosotros."},
            {emoji:"❤️",titulo:"Más que vino",texto:"Esta actividad sin ánimo de lucro no ha hecho otra cosa que fortalecer nuestros lazos familiares. Nos permite reunirnos muchas más veces al año y compartir una relación que, por circunstancias geográficas, resultaba más complicada antes. Quebracántaros no es solo el nombre de nuestro vino: es el nombre de lo que hacemos cuando estamos juntos."},
          ].map(({emoji,titulo,texto})=>(
            <div key={titulo} style={{marginBottom:24}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <span style={{fontSize:22}}>{emoji}</span>
                <h3 style={{fontFamily:"Montserrat",fontSize:13,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--gold)"}}>{titulo}</h3>
              </div>
              <p style={{fontFamily:"'Crimson Pro',serif",fontSize:17,color:"var(--tx2)",lineHeight:1.8,paddingLeft:32}}>{texto}</p>
            </div>
          ))}

          <div style={{...S.C,background:"rgba(232,168,32,.05)",textAlign:"center",padding:"24px 20px",marginTop:8}}>
            <OriLogo size={36}/>
            <p style={{fontFamily:"'Crimson Pro',serif",fontSize:18,fontStyle:"italic",color:"var(--gold)",marginTop:12,lineHeight:1.7}}>
              "Juntos, como familia que somos,<br/>nada nos impide seguir<br/>fortaleciendo nuestros saberes<br/>y nuestra unión."
            </p>
            <p style={{fontFamily:"Montserrat",fontSize:9,letterSpacing:".14em",textTransform:"uppercase",color:"var(--tx3)",marginTop:10}}>Familia Oriol · Desde 2020</p>
          </div>
        </div>
      </div>
    );
  }

  /* ══ CONFIG ══════════════════════════════════════════════════════ */
  function Config(){
    return(
      <div className="fade">
        <h2 style={S.H2}>Configuración</h2>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={S.C}><span style={S.LB}>Nombre de la bodega</span><SI value={bodega} save={setBodega} placeholder="Bodega Orioles"/></div>
          <div style={S.C}><span style={S.LB}>Lema / Subtítulo</span><SI value={lema} save={setLema} placeholder="Quebracántaros · Valdejalón"/></div>
          <div style={S.C}>
            <p style={{...S.H3,marginBottom:6}}>📲 Instalar app</p>
            <p style={{fontSize:12,color:"var(--tx2)",lineHeight:1.7,marginBottom:10}}>Instala Bodega Orioles en la pantalla de inicio para usarla sin navegador.</p>
            <button className="bg" style={{width:"100%",padding:11}} onClick={()=>window.triggerInstall&&window.triggerInstall()}>📲 Instalar en este móvil</button>
            <p style={{fontSize:11,color:"var(--tx3)",marginTop:8,lineHeight:1.6}}>Si no funciona: Chrome → Menú ⋮ → "Añadir a pantalla de inicio"</p>
          </div>
          <div style={S.C}>
            <p style={{...S.H3,marginBottom:6}}>⬇ Copia de seguridad</p>
            <button className="bg" style={{width:"100%",padding:10}} onClick={()=>{
              const data={socios,vendimias:vends,faenas,asistencia:asist,inventario:invCat,gastos,bodega,lema};
              const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
              const a=document.createElement("a");a.href=URL.createObjectURL(blob);
              a.download="orioles-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();
            }}>⬇ Descargar backup JSON</button>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <header style={{background:"#0D0D0D",borderBottom:"1px solid rgba(232,168,32,.14)",padding:"11px 16px",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:12,maxWidth:820,margin:"0 auto"}}>
          <OriLogo size={30}/>
          <div>
            <h1 style={{fontFamily:"Montserrat",fontSize:16,fontWeight:700,letterSpacing:".22em",textTransform:"uppercase",color:"var(--gold)",lineHeight:1}}>ORIOLES</h1>
            <p style={{fontSize:9,fontWeight:500,letterSpacing:".14em",textTransform:"uppercase",color:"var(--tx2)",marginTop:2}}>{lema}</p>
          </div>
        </div>
      </header>
      <nav style={{display:"flex",overflowX:"auto",gap:2,padding:"5px 10px",borderBottom:"1px solid var(--br2)",background:"#111",position:"sticky",top:53,zIndex:49}}>
        {TABS.map(t=><button key={t.id} className={"tb "+(tab===t.id?"a":"")} onClick={()=>setTab(t.id)}>{t.l}</button>)}
      </nav>
      <main style={{padding:"20px 14px 64px",maxWidth:820,margin:"0 auto"}}>
        {tab==="inicio"        &&<Inicio/>}
        {tab==="vendimias"     &&<Vendimias/>}
        {tab==="faenas"        &&<Faenas/>}
        {tab==="inventario"    &&<Inventario/>}
        {tab==="economia"      &&<Economia/>}
        {tab==="socios"        &&<Socios/>}
        {tab==="idiosincrasia" &&<Idiosincrasia/>}
        {tab==="config"        &&<Config/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
if("serviceWorker"in navigator&&location.protocol==="https:"){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js").then(reg=>{
      reg.addEventListener("updatefound",()=>{const sw=reg.installing;sw.addEventListener("statechange",()=>{if(sw.state==="installed"&&navigator.serviceWorker.controller)sw.postMessage("SKIP_WAITING");});});
    }).catch(e=>console.warn("SW:",e));
    navigator.serviceWorker.addEventListener("controllerchange",()=>window.location.reload());
  });
}
let dp=null;const bn=document.getElementById("ib");
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();dp=e;bn.style.display="flex";});
function triggerInstall(){if(dp){dp.prompt();dp.userChoice.then(()=>{dp=null;bn.style.display="none";});}else{alert("Android: Chrome → Menú ⋮ → Añadir a pantalla de inicio\niPhone: Safari → Compartir → Añadir a pantalla de inicio");}}
window.triggerInstall=triggerInstall;
document.getElementById("ibb").addEventListener("click",triggerInstall);
document.getElementById("ibc").addEventListener("click",()=>{bn.style.display="none";});
window.addEventListener("appinstalled",()=>{bn.style.display="none";});
</script>
</body>
</html>
